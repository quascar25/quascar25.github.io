    <style>

        .top-bar {

<body>
<div class="app">
    <div class="card" id="questionCard">---</div>

    <div class="top-bar">
        <div class="theme-selector">
            <select id="themeSelect" class="theme-dropdown">
                <option value="all">­¤ōÜ ąÆčüąĄ čéąĄą╝čŗ (ąŠą▒čāčćąĄąĮąĖąĄ)</option>
            </select>
        </div>
        <div class="mode-switch">
            <button class="mode-btn" data-mode="ru2fr">RUŌåÆFR</button>
            <button class="mode-btn" data-mode="fr2ru">FRŌåÆRU</button>
        </div>
        <button id="speakerBtn" class="speaker-btn" title="ą¤čĆąŠąĖąĘąĮąĄčüčéąĖ čüą╗ąŠą▓ąŠ">­¤öŖ</button>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="answerInput" placeholder="ąÆą░čł ąŠčéą▓ąĄčé..." autocomplete="off" autofocus>
            <div class="action-buttons">
                <button id="skipBtn" class="nav-btn" title="ąĪą╗ąĄą┤čāčÄčēąĄąĄ čüą╗ąŠą▓ąŠ ą▒ąĄąĘ ą┐čĆąŠą▓ąĄčĆą║ąĖ">ŌĆ║</button>
                <button id="submitBtn" class="action-btn">OK</button>
            </div>
        </div>
    </div>

    <div class="keyboard" id="keyboard"></div>
    <div class="status" id="statusMsg">­¤Ä¦ ąØą░ąČą╝ąĖčéąĄ ąĮą░ ą┤ąĖąĮą░ą╝ąĖą║ ŌĆö čāčüą╗čŗčłąĖčéąĄ čüą╗ąŠą▓ąŠ</div>
    <div class="footer-note">ążąŠčĆą╝ą░čé: čéąĄą╝ą░ | čĆčāčüčüą║ąĖą╣ | čäčĆą░ąĮčåčāąĘčüą║ąĖą╣ | ŌĆ║ ŌĆö ą┐čĆąŠą┐čāčüčéąĖčéčī čüą╗ąŠą▓ąŠ</div>
</div>

<script>
    // ---------- ąōąøą×ąæąÉąøą¼ąØą½ąĢ ą¤ąĢąĀąĢą£ąĢąØąØą½ąĢ ----------
    let fullWordsList = [];     // { theme, ru, fr }
    let currentTheme = "all";
    let filteredWordsList = [];
    let currentWordObj = null;
    let currentMode = "ru2fr";
    let remainingIndices = [];
    let lastAnswerWasOk = false;

    // DOM čŹą╗ąĄą╝ąĄąĮčéčŗ
    const questionCard = document.getElementById("questionCard");
    const answerInput = document.getElementById("answerInput");
    const submitBtn = document.getElementById("submitBtn");
    const skipBtn = document.getElementById("skipBtn");
    const speakerBtn = document.getElementById("speakerBtn");
    const themeSelect = document.getElementById("themeSelect");
    const keyboardDiv = document.getElementById("keyboard");
    const statusMsgDiv = document.getElementById("statusMsg");

    // ---------- ążąĀąÉąØą”ąŻąŚąĪąÜąÉą» ąÜąøąÉąÆąśąÉąóąŻąĀąÉ ----------
    const frenchLetters = [
        ['a','b','c','d','e','f','g','h','i','j','k','l','m'],
        ['n','o','p','q','r','s','t','u','v','w','x','y','z'],
        ['├Ā','├ó','├”','├¦','├®','├©','├¬','├½','├«','├»','├┤','┼ō','├╣','├╗','├╝','├┐','├▒','-',"'"]
    ];
    const extraButtons = ['ŌåÉ', ' '];

    // ---------- ąōą×ąøą×ąĪą×ąÆą×ąĢ ą¤ąĀą×ąśąŚąØą×ą©ąĢąØąśąĢ ----------
/ ---------- ąōą×ąøą×ąĪą×ąÆą×ąĢ ą¤ąĀą×ąśąŚąØą×ą©ąĢąØąśąĢ (ąĀąÉąæą×ąóąÉąĢąó ąØąÉ ANDROID) ----------
let voicesLoaded = false;
let retryCount = 0;

function loadVoices(callback) {
    if (voicesLoaded) {
        if (callback) callback();
        return;
    }
    
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
        voicesLoaded = true;
        if (callback) callback();
        return;
    }
    
    // ąĢčüą╗ąĖ ą│ąŠą╗ąŠčüą░ ąĄčēčæ ąĮąĄ ąĘą░ą│čĆčāąČąĄąĮčŗ, ąČą┤čæą╝ čüąŠą▒čŗčéąĖčÅ
    window.speechSynthesis.onvoiceschanged = () => {
        voicesLoaded = true;
        if (callback) callback();
    };
    
    // ąŚą░ą┐ą░čüąĮąŠą╣ ą▓ą░čĆąĖą░ąĮčé: ąĄčüą╗ąĖ čüąŠą▒čŗčéąĖąĄ ąĮąĄ čüčĆą░ą▒ąŠčéą░ą╗ąŠ čćąĄčĆąĄąĘ 1 čüąĄą║čāąĮą┤čā
    setTimeout(() => {
        if (!voicesLoaded) {
            voicesLoaded = true;
            if (callback) callback();
        }
    }, 1000);
}

function speakText(text, lang) {
    if (!text || text === "---") return;
    
    // ą×čüčéą░ąĮą░ą▓ą╗ąĖą▓ą░ąĄą╝ ą┐čĆąĄą┤čŗą┤čāčēčāčÄ čĆąĄčćčī
    window.speechSynthesis.cancel();
    
    // ą¢ą┤čæą╝ ąĘą░ą│čĆčāąĘą║ąĖ ą│ąŠą╗ąŠčüąŠą▓, ąĘą░čéąĄą╝ ą│ąŠą▓ąŠčĆąĖą╝
    loadVoices(() => {
        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.85;
            utterance.pitch = 1.0;
            utterance.volume = 1;
            
            // ą¤čŗčéą░ąĄą╝čüčÅ ąĮą░ą╣čéąĖ ą┐ąŠą┤čģąŠą┤čÅčēąĖą╣ ą│ąŠą╗ąŠčü (ąŠą┐čåąĖąŠąĮą░ą╗čīąĮąŠ, ąĮąŠ ą┐ąŠą╝ąŠą│ą░ąĄčé)
            const voices = window.speechSynthesis.getVoices();
            if (lang === "fr-FR") {
                // ąśčēąĄą╝ čäčĆą░ąĮčåčāąĘčüą║ąĖą╣ ą│ąŠą╗ąŠčü (ą╗čÄą▒ąŠą╣)
                const frenchVoice = voices.find(v => v.lang === "fr-FR" || v.lang.startsWith("fr"));
                if (frenchVoice) utterance.voice = frenchVoice;
            } else if (lang === "ru-RU") {
                const russianVoice = voices.find(v => v.lang === "ru-RU");
                if (russianVoice) utterance.voice = russianVoice;
            }
            
            window.speechSynthesis.speak(utterance);
            
            statusMsgDiv.innerHTML = `­¤öŖ ą¤čĆąŠąĖąĘąĮąŠčüąĖčéčüčÅ: "${text.substring(0, 30)}..."`;
            setTimeout(() => {
                if (statusMsgDiv.innerHTML.includes("ą¤čĆąŠąĖąĘąĮąŠčüąĖčéčüčÅ")) {
                    statusMsgDiv.innerHTML = "­¤ōÜ ąÆčŗą▒ąĄčĆąĖčéąĄ čéąĄą╝čā ąĖ čéčĆąĄąĮąĖčĆčāą╣čéąĄčüčī";
                }
            }, 2000);
        }, 50);
    });
}

function speakCurrentWord() {
    if (!currentWordObj) return;
    let textToSpeak = currentMode === "ru2fr" ? currentWordObj.ru : currentWordObj.fr;
    let lang = currentMode === "ru2fr" ? "ru-RU" : "fr-FR";
    if (textToSpeak) speakText(textToSpeak, lang);
}

// ą¤čĆąĖąĮčāą┤ąĖčéąĄą╗čīąĮą░čÅ ąĘą░ą│čĆčāąĘą║ą░ ą│ąŠą╗ąŠčüąŠą▓ ą┐čĆąĖ čüčéą░čĆčéąĄ
window.addEventListener('load', () => {
    loadVoices(() => console.log("ąōąŠą╗ąŠčüą░ ąĘą░ą│čĆčāąČąĄąĮčŗ"));
});

// ąöą╗čÅ čüą╝ą░čĆčéčäąŠąĮąŠą▓: ą┐čĆąĖ ą┐ąĄčĆą▓ąŠą╝ ą║ą░čüą░ąĮąĖąĖ čŹą║čĆą░ąĮą░ "ą▒čāą┤ąĖą╝" čüąĖąĮčéąĄąĘą░čéąŠčĆ
document.addEventListener('touchstart', function wakeSpeech() {
    if (!voicesLoaded) {
        const utterance = new SpeechSynthesisUtterance(" ");
        utterance.lang = "fr-FR";
        window.speechSynthesis.speak(utterance);
        setTimeout(() => window.speechSynthesis.cancel(), 100);
    }
    document.removeEventListener('touchstart', wakeSpeech);
}, { once: true });

    
    // ---------- ąĀąÉąæą×ąóąÉ ąĪą× ąĪą¤ąśąĪąÜą×ą£ ąĪąøą×ąÆ ----------
    function updateFilteredWords() {
        if (currentTheme === "all") {
            filteredWordsList = [...fullWordsList];
        } else {
            filteredWordsList = fullWordsList.filter(w => w.theme === currentTheme);
        }
        if (filteredWordsList.length === 0) {
            filteredWordsList = [{ theme: "empty", ru: "ąØąĄčé čüą╗ąŠą▓ ą▓ čéąĄą╝ąĄ", fr: "Pas de mots" }];
        }
        resetRemainingIndices();
        pickRandomWord();
    }

    function resetRemainingIndices() {
        if (!filteredWordsList.length) return;
        remainingIndices = [...Array(filteredWordsList.length).keys()];
        for (let i = remainingIndices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [remainingIndices[i], remainingIndices[j]] = [remainingIndices[j], remainingIndices[i]];
        }
    }

    function pickRandomWord() {
        if (!filteredWordsList.length) return;
        if (remainingIndices.length === 0) resetRemainingIndices();
        const nextIndex = remainingIndices.shift();
        currentWordObj = filteredWordsList[nextIndex];
        showQuestion();
    }

    function showQuestion() {
        if (!currentWordObj) return;
        if (currentMode === "ru2fr") {
            questionCard.innerText = currentWordObj.ru;
        } else {
            questionCard.innerText = currentWordObj.fr;
        }
        answerInput.value = "";
        setSubmitButtonNeutral();
        lastAnswerWasOk = false;
        answerInput.focus();
    }

    function skipToNextWord() {
        if (!filteredWordsList.length) return;
        // ąĢčüą╗ąĖ čüą╗ąŠą▓ąŠ-ą┐čāčüčéčŗčłą║ą░, ą┐čĆąŠčüčéąŠ ąĖą│ąĮąŠčĆąĖčĆčāąĄą╝
        if (currentWordObj && currentWordObj.ru === "ąØąĄčé čüą╗ąŠą▓ ą▓ čéąĄą╝ąĄ") return;
        
        // ą¤ąĄčĆąĄčģąŠą┤ąĖą╝ ą║ čüą╗ąĄą┤čāčÄčēąĄą╝čā čüą╗ąŠą▓čā ą▒ąĄąĘ ą┐čĆąŠą▓ąĄčĆą║ąĖ
        if (remainingIndices.length === 0) resetRemainingIndices();
        const nextIndex = remainingIndices.shift();
        currentWordObj = filteredWordsList[nextIndex];
        showQuestion();
        statusMsgDiv.innerHTML = "ŌÅ® ą¤čĆąŠą┐čāčēąĄąĮąŠ! ąĪą╗ąĄą┤čāčÄčēąĄąĄ čüą╗ąŠą▓ąŠ...";
        setTimeout(() => {
            if (statusMsgDiv.innerHTML.includes("ą¤čĆąŠą┐čāčēąĄąĮąŠ")) {
                statusMsgDiv.innerHTML = "­¤ōÜ ąÆčŗą▒ąĄčĆąĖčéąĄ čéąĄą╝čā ąĖ čéčĆąĄąĮąĖčĆčāą╣čéąĄčüčī";
            }
        }, 1500);
    }

    function checkAnswer() {
        if (!currentWordObj || currentWordObj.ru === "ąØąĄčé čüą╗ąŠą▓ ą▓ čéąĄą╝ąĄ") return;
        let userAnswer = answerInput.value.trim().toLowerCase().replace(/\s+/g, ' ');
        let correctAnswer = (currentMode === "ru2fr") 
            ? currentWordObj.fr.toLowerCase().replace(/\s+/g, ' ')
            : currentWordObj.ru.toLowerCase().replace(/\s+/g, ' ');
        
        const isCorrect = (userAnswer === correctAnswer);
        if (isCorrect) {
            submitBtn.innerText = "Ō£ģ";
            submitBtn.classList.add("correct");
            submitBtn.classList.remove("wrong");
            statusMsgDiv.innerHTML = "Ō£ģ ąÆąĄčĆąĮąŠ! ąĪą╗ąĄą┤čāčÄčēąĄąĄ čüą╗ąŠą▓ąŠ...";
            setTimeout(() => {
                pickRandomWord();
                setSubmitButtonNeutral();
            }, 600);
        } else {
            submitBtn.innerText = "ŌØī";
            submitBtn.classList.add("wrong");
            submitBtn.classList.remove("correct");
            statusMsgDiv.innerHTML = `ŌØī ąØąĄą▓ąĄčĆąĮąŠ! ą¤čĆą░ą▓ąĖą╗čīąĮąŠ: "${correctAnswer}"`;
        }
        lastAnswerWasOk = true;
    }

    function setSubmitButtonNeutral() {
        submitBtn.innerText = "OK";
        submitBtn.classList.remove("correct", "wrong");
        if (!statusMsgDiv.innerHTML.includes("­¤öŖ") && !statusMsgDiv.innerHTML.includes("ŌÅ®")) {
            statusMsgDiv.innerHTML = "­¤ōØ ąÆą▓ąĄą┤ąĖčéąĄ ąŠčéą▓ąĄčé ąĖ ąĮą░ąČą╝ąĖčéąĄ OK";
        }
    }

    function onInputChange() {
        if (lastAnswerWasOk || submitBtn.innerText !== "OK") {
            setSubmitButtonNeutral();
            lastAnswerWasOk = false;
        }
    }

    function addCharToInput(ch) {
        if (ch === 'ŌåÉ') {
            answerInput.value = answerInput.value.slice(0, -1);
        } else if (ch === ' ') {
            answerInput.value += ' ';
        } else {
            answerInput.value += ch;
        }
        if (submitBtn.innerText !== "OK") {
            setSubmitButtonNeutral();
            lastAnswerWasOk = false;
        }
        answerInput.focus();
    }

    function renderKeyboard() {
        keyboardDiv.innerHTML = '';
        for (let row of frenchLetters) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'kb-row';
            for (let letter of row) {
                const key = document.createElement('div');
                key.className = 'kb-key';
                key.innerText = letter;
                key.addEventListener('click', () => addCharToInput(letter));
                rowDiv.appendChild(key);
            }
            keyboardDiv.appendChild(rowDiv);
        }
        const extraRow = document.createElement('div');
        extraRow.className = 'kb-row';
        for (let btn of extraButtons) {
            const key = document.createElement('div');
            key.className = 'kb-key kb-special';

    async function loadWords() {
        try {
            const response = await fetch('fslov1.txt');
            if (response.ok) {
                const text = await response.text();
                const lines = text.split(/\r?\n/);
                for (let line of lines) {
                    line = line.trim();
                    if (line === "") continue;
                    const parts = line.split('|');
                    if (parts.length >= 3) {
                        fullWordsList.push({
                            theme: parts[0].trim(),
                            ru: parts[1].trim(),
                            fr: parts[2].trim()
                        });
                    }
                }
            }
        } catch(e) { console.log("ąŚą░ą│čĆčāąČą░ąĄą╝ ą▓čüčéčĆąŠąĄąĮąĮčŗą╣ čüą╗ąŠą▓ą░čĆčī"); }
        
        if (fullWordsList.length === 0) {
            const builtIn = getBuiltInDictionary();
            for (let entry of builtIn) {
                const parts = entry.split('|');
                if (parts.length === 3) {
                    fullWordsList.push({
                        theme: parts[0],
                        ru: parts[1],
                        fr: parts[2]
                    });
                }
            }
        }
        
        populateThemeDropdown();
        updateFilteredWords();
        renderKeyboard();
    }

    function initUI() {
        document.querySelector('[data-mode="ru2fr"]').addEventListener('click', () => setMode("ru2fr"));
        document.querySelector('[data-mode="fr2ru"]').addEventListener('click', () => setMode("fr2ru"));
        speakerBtn.addEventListener('click', speakCurrentWord);
        submitBtn.addEventListener('click', onSubmitAction);
        skipBtn.addEventListener('click', skipToNextWord);
        answerInput.addEventListener('input', onInputChange);
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') onSubmitAction();
        });
        themeSelect.addEventListener('change', (e) => {
            currentTheme = e.target.value;
            updateFilteredWords();
        });
        setMode("ru2fr");
    }

    loadWords().then(() => initUI());
</script>
</body>
</html>
