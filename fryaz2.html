<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1f2e'/%3E%3Ctext x='50' y='72' font-size='58' font-weight='bold' font-family='Arial, sans-serif' text-anchor='middle' fill='%23e6b422'%3EFR%3C/text%3E%3C/svg%3E" alt="FR">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FrenchMaster вАФ —В—А–µ–љ–Є—А–Њ–≤–Ї–∞ —Б —В–µ–Љ–∞–Љ–Є</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0e1a;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 600px;
            width: 100%;
            background: #111520;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            padding: 20px 16px 24px;
            border: 1px solid #2a2f3f;
        }
        .card {
            background: #1a1f2e;
            border-radius: 28px;
            padding: 32px 16px;
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            color: #eef2ff;
            margin-bottom: 24px;
            border: 1px solid #2e3548;
            word-break: break-word;
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2), 0 2px 6px rgba(0,0,0,0.2);
        }
        /* –≤–µ—А—Е–љ—П—П –њ–∞–љ–µ–ї—М */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .theme-selector {
            flex: 2;
            min-width: 150px;
        }
        .theme-dropdown {
            width: 100%;
            padding: 12px 14px;
            background: #1e2538;
            border: 1px solid #3a415a;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #eef2ff;
            cursor: pointer;
            font-family: inherit;
        }
        .theme-dropdown:focus {
            outline: none;
            border-color: #5a6e9e;
        }
        .mode-switch {
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            background: #1e2538;
            border: 1px solid #3a415a;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #b9c3e6;
        }
        .mode-btn.active {
            background: #3b4b6e;
            color: white;
            border-color: #6d84b5;
        }
        .speaker-btn {
            background: #1e2538;
            border: 1px solid #3a415a;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: #b9c3e6;
        }
        .speaker-btn:active {
            background: #3b4b6e;
            transform: scale(0.96);
        }
        .input-area {
            margin-bottom: 20px;
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        input {
            flex: 1;
            padding: 16px 14px;
            font-size: 1.3rem;
            border: 2px solid #2e3548;
            border-radius: 24px;
            font-family: monospace;
            background: #0f1320;
            color: #eef2ff;
            text-align: center;
            letter-spacing: 0.5px;
        }
        input:focus {
            outline: none;
            border-color: #5a6e9e;
        }
        input::placeholder {
            color: #4a5370;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .nav-btn {
            width: 55px;
            padding: 14px 0;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            background: #2e3a52;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .nav-btn:active {
            transform: scale(0.96);
            background: #3b4b6e;
        }
        .action-btn {
            width: 70px;
            padding: 14px 0;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            background: #3b4b6e;
            color: white;
            cursor: pointer;
        }
        .action-btn.correct {
            background: #2e7d32;
        }
        .action-btn.wrong {
            background: #c62828;
        }
        .keyboard {
            background: #0d1220;
            border-radius: 28px;
            padding: 12px 10px;
            margin-top: 6px;
            border: 1px solid #2a2f3f;
        }
        .kb-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .kb-key {
            background: #1a1f2e;
            border: 1px solid #3a415a;
            border-radius: 16px;
            padding: 12px 10px;
            min-width: 50px;
            text-align: center;
            font-size: 1.8rem;    /* <--- –≠–Ґ–Ю –У–Ы–Р–Т–Э–Ю–Х */
            font-weight: 500;
            font-family: monospace;
            cursor: pointer;
            color: #eef2ff;
            transition: 0.05s linear;
        }
        .kb-key:active {
            background: #2e3a52;
            transform: scale(0.96);
        }
        .kb-special {
            background: #252c40;
        }
        @media (max-width: 480px) {
            .kb-key {
                min-width: 52px;
                padding: 10px 6px;
                font-size: 2.2rem;
            }
            .kb-row {
                gap: 6px;
            }
            .card {
                font-size: 1.5rem;
                padding: 24px 12px;
            }
            input {
                font-size: 1.1rem;
            }
            .speaker-btn {
                width: 44px;
                height: 44px;
                font-size: 1.4rem;
            }
            .theme-dropdown {
                font-size: 0.8rem;
                padding: 10px 12px;
            }
            .mode-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
            .nav-btn {
                width: 48px;
                font-size: 1rem;
            }
            .action-btn {
                width: 60px;
                font-size: 1rem;
            }
        }
        .status {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 12px;
            color: #7e89ac;
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #4a5370;
        }
        option {
            background: #1a1f2e;
            color: #eef2ff;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="card" id="questionCard">---</div>

    <div class="top-bar">
        <div class="theme-selector">
            <select id="themeSelect" class="theme-dropdown">
                <option value="all">рЯУЪ –Т—Б–µ —В–µ–Љ—Л (–Њ–±—Г—З–µ–љ–Є–µ)</option>
            </select>
        </div>
        <div class="mode-switch">
            <button class="mode-btn" data-mode="ru2fr">RUвЖТFR</button>
            <button class="mode-btn" data-mode="fr2ru">FRвЖТRU</button>
        </div>
        <button id="speakerBtn" class="speaker-btn" title="–Я—А–Њ–Є–Ј–љ–µ—Б—В–Є —Б–ї–Њ–≤–Њ">рЯФК</button>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="answerInput" placeholder="–Т–∞—И –Њ—В–≤–µ—В..." autocomplete="off" autofocus>
            <div class="action-buttons">
                <button id="skipBtn" class="nav-btn" title="–°–ї–µ–і—Г—О—Й–µ–µ —Б–ї–Њ–≤–Њ –±–µ–Ј –њ—А–Њ–≤–µ—А–Ї–Є">вАЇ</button>
                <button id="submitBtn" class="action-btn">OK</button>
            </div>
        </div>
    </div>

    <div class="keyboard" id="keyboard"></div>
    <div class="status" id="statusMsg">рЯОІ –Э–∞–ґ–Љ–Є—В–µ –љ–∞ –і–Є–љ–∞–Љ–Є–Ї вАФ —Г—Б–ї—Л—И–Є—В–µ —Б–ї–Њ–≤–Њ</div>
    <div class="footer-note">–§–Њ—А–Љ–∞—В: —В–µ–Љ–∞ | —А—Г—Б—Б–Ї–Є–є | —Д—А–∞–љ—Ж—Г–Ј—Б–Ї–Є–є | вАЇ вАФ –њ—А–Њ–њ—Г—Б—В–Є—В—М —Б–ї–Њ–≤–Њ</div>
</div>

<script>
    // ---------- –У–Ы–Ю–С–Р–Ы–ђ–Э–Ђ–Х –Я–Х–†–Х–Ь–Х–Э–Э–Ђ–Х ----------
    let fullWordsList = [];     // { theme, ru, fr }
    let currentTheme = "all";
    let filteredWordsList = [];
    let currentWordObj = null;
    let currentMode = "ru2fr";
    let remainingIndices = [];
    let lastAnswerWasOk = false;

    // DOM —Н–ї–µ–Љ–µ–љ—В—Л
    const questionCard = document.getElementById("questionCard");
    const answerInput = document.getElementById("answerInput");
    const submitBtn = document.getElementById("submitBtn");
    const skipBtn = document.getElementById("skipBtn");
    const speakerBtn = document.getElementById("speakerBtn");
    const themeSelect = document.getElementById("themeSelect");
    const keyboardDiv = document.getElementById("keyboard");
    const statusMsgDiv = document.getElementById("statusMsg");

    // ---------- –§–†–Р–Э–¶–£–Ч–°–Ъ–Р–ѓ –Ъ–Ы–Р–Т–Ш–Р–Ґ–£–†–Р ----------
    const frenchLetters = [
        ['a','b','c','d','e','f','g','h','i','j','k','l','m'],
        ['n','o','p','q','r','s','t','u','v','w','x','y','z'],
        ['√†','√Ґ','√¶','√І','√©','√®','√™','√Ђ','√Ѓ','√ѓ','√і','≈У','√є','√ї','√Љ','√њ','√±','-',"'"]
    ];
    const extraButtons = ['вЖР', ' '];

// ---------- –У–Ю–Ы–Ю–°–Ю–Т–Ю–Х –Я–†–Ю–Ш–Ч–Э–Ю–®–Х–Э–Ш–Х (–†–Р–С–Ю–Ґ–Р–Х–Ґ –Э–Р ANDROID) ----------
let voicesLoaded = false;
let retryCount = 0;

function loadVoices(callback) {
    if (voicesLoaded) {
        if (callback) callback();
        return;
    }
    
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
        voicesLoaded = true;
        if (callback) callback();
        return;
    }
    
    // –Х—Б–ї–Є –≥–Њ–ї–Њ—Б–∞ –µ—Й—С –љ–µ –Ј–∞–≥—А—Г–ґ–µ–љ—Л, –ґ–і—С–Љ —Б–Њ–±—Л—В–Є—П
    window.speechSynthesis.onvoiceschanged = () => {
        voicesLoaded = true;
        if (callback) callback();
    };
    
    // –Ч–∞–њ–∞—Б–љ–Њ–є –≤–∞—А–Є–∞–љ—В: –µ—Б–ї–Є —Б–Њ–±—Л—В–Є–µ –љ–µ —Б—А–∞–±–Њ—В–∞–ї–Њ —З–µ—А–µ–Ј 1 —Б–µ–Ї—Г–љ–і—Г
    setTimeout(() => {
        if (!voicesLoaded) {
            voicesLoaded = true;
            if (callback) callback();
        }
    }, 1000);
}

function speakText(text, lang) {
    if (!text || text === "---") return;
    
    // –Ю—Б—В–∞–љ–∞–≤–ї–Є–≤–∞–µ–Љ –њ—А–µ–і—Л–і—Г—Й—Г—О —А–µ—З—М
    window.speechSynthesis.cancel();
    
    // –Ц–і—С–Љ –Ј–∞–≥—А—Г–Ј–Ї–Є –≥–Њ–ї–Њ—Б–Њ–≤, –Ј–∞—В–µ–Љ –≥–Њ–≤–Њ—А–Є–Љ
    loadVoices(() => {
        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.85;
            utterance.pitch = 1.0;
            utterance.volume = 1;
            
            // –Я—Л—В–∞–µ–Љ—Б—П –љ–∞–є—В–Є –њ–Њ–і—Е–Њ–і—П—Й–Є–є –≥–Њ–ї–Њ—Б (–Њ–њ—Ж–Є–Њ–љ–∞–ї—М–љ–Њ, –љ–Њ –њ–Њ–Љ–Њ–≥–∞–µ—В)
            const voices = window.speechSynthesis.getVoices();
            if (lang === "fr-FR") {
                // –Ш—Й–µ–Љ —Д—А–∞–љ—Ж—Г–Ј—Б–Ї–Є–є –≥–Њ–ї–Њ—Б (–ї—О–±–Њ–є)
                const frenchVoice = voices.find(v => v.lang === "fr-FR" || v.lang.startsWith("fr"));
                if (frenchVoice) utterance.voice = frenchVoice;
            } else if (lang === "ru-RU") {
                const russianVoice = voices.find(v => v.lang === "ru-RU");
                if (russianVoice) utterance.voice = russianVoice;
            }
            
            window.speechSynthesis.speak(utterance);
            
            statusMsgDiv.innerHTML = `рЯФК –Я—А–Њ–Є–Ј–љ–Њ—Б–Є—В—Б—П: "${text.substring(0, 30)}..."`;
            setTimeout(() => {
                if (statusMsgDiv.innerHTML.includes("–Я—А–Њ–Є–Ј–љ–Њ—Б–Є—В—Б—П")) {
                    statusMsgDiv.innerHTML = "рЯУЪ –Т—Л–±–µ—А–Є—В–µ —В–µ–Љ—Г –Є —В—А–µ–љ–Є—А—Г–є—В–µ—Б—М";
                }
            }, 2000);
        }, 50);
    });
}

function speakCurrentWord() {
    if (!currentWordObj) return;
    let textToSpeak = currentMode === "ru2fr" ? currentWordObj.ru : currentWordObj.fr;
    let lang = currentMode === "ru2fr" ? "ru-RU" : "fr-FR";
    if (textToSpeak) speakText(textToSpeak, lang);
}

// –Я—А–Є–љ—Г–і–Є—В–µ–ї—М–љ–∞—П –Ј–∞–≥—А—Г–Ј–Ї–∞ –≥–Њ–ї–Њ—Б–Њ–≤ –њ—А–Є —Б—В–∞—А—В–µ
window.addEventListener('load', () => {
    loadVoices(() => console.log("–У–Њ–ї–Њ—Б–∞ –Ј–∞–≥—А—Г–ґ–µ–љ—Л"));
});

// –Ф–ї—П —Б–Љ–∞—А—В—Д–Њ–љ–Њ–≤: –њ—А–Є –њ–µ—А–≤–Њ–Љ –Ї–∞—Б–∞–љ–Є–Є —Н–Ї—А–∞–љ–∞ "–±—Г–і–Є–Љ" —Б–Є–љ—В–µ–Ј–∞—В–Њ—А
document.addEventListener('touchstart', function wakeSpeech() {
    if (!voicesLoaded) {
        const utterance = new SpeechSynthesisUtterance(" ");
        utterance.lang = "fr-FR";
        window.speechSynthesis.speak(utterance);
        setTimeout(() => window.speechSynthesis.cancel(), 100);
    }
    document.removeEventListener('touchstart', wakeSpeech);
}, { once: true });

    
    // ---------- –†–Р–С–Ю–Ґ–Р –°–Ю –°–Я–Ш–°–Ъ–Ю–Ь –°–Ы–Ю–Т ----------
    function updateFilteredWords() {
        if (currentTheme === "all") {
            filteredWordsList = [...fullWordsList];
        } else {
            filteredWordsList = fullWordsList.filter(w => w.theme === currentTheme);
        }
        if (filteredWordsList.length === 0) {
            filteredWordsList = [{ theme: "empty", ru: "–Э–µ—В —Б–ї–Њ–≤ –≤ —В–µ–Љ–µ", fr: "Pas de mots" }];
        }
        resetRemainingIndices();
        pickRandomWord();
    }

    function resetRemainingIndices() {
        if (!filteredWordsList.length) return;
        remainingIndices = [...Array(filteredWordsList.length).keys()];
        for (let i = remainingIndices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [remainingIndices[i], remainingIndices[j]] = [remainingIndices[j], remainingIndices[i]];
        }
    }

    function pickRandomWord() {
        if (!filteredWordsList.length) return;
        if (remainingIndices.length === 0) resetRemainingIndices();
        const nextIndex = remainingIndices.shift();
        currentWordObj = filteredWordsList[nextIndex];
        showQuestion();
    }

    function showQuestion() {
        if (!currentWordObj) return;
        if (currentMode === "ru2fr") {
            questionCard.innerText = currentWordObj.ru;
        } else {
            questionCard.innerText = currentWordObj.fr;
        }
        answerInput.value = "";
        setSubmitButtonNeutral();
        lastAnswerWasOk = false;
        answerInput.focus();
    }

    function skipToNextWord() {
        if (!filteredWordsList.length) return;
        // –Х—Б–ї–Є —Б–ї–Њ–≤–Њ-–њ—Г—Б—В—Л—И–Ї–∞, –њ—А–Њ—Б—В–Њ –Є–≥–љ–Њ—А–Є—А—Г–µ–Љ
        if (currentWordObj && currentWordObj.ru === "–Э–µ—В —Б–ї–Њ–≤ –≤ —В–µ–Љ–µ") return;
        
        // –Я–µ—А–µ—Е–Њ–і–Є–Љ –Ї —Б–ї–µ–і—Г—О—Й–µ–Љ—Г —Б–ї–Њ–≤—Г –±–µ–Ј –њ—А–Њ–≤–µ—А–Ї–Є
        if (remainingIndices.length === 0) resetRemainingIndices();
        const nextIndex = remainingIndices.shift();
        currentWordObj = filteredWordsList[nextIndex];
        showQuestion();
        statusMsgDiv.innerHTML = "вП© –Я—А–Њ–њ—Г—Й–µ–љ–Њ! –°–ї–µ–і—Г—О—Й–µ–µ —Б–ї–Њ–≤–Њ...";
        setTimeout(() => {
            if (statusMsgDiv.innerHTML.includes("–Я—А–Њ–њ—Г—Й–µ–љ–Њ")) {
                statusMsgDiv.innerHTML = "рЯУЪ –Т—Л–±–µ—А–Є—В–µ —В–µ–Љ—Г –Є —В—А–µ–љ–Є—А—Г–є—В–µ—Б—М";
            }
        }, 1500);
    }

    function checkAnswer() {
        if (!currentWordObj || currentWordObj.ru === "–Э–µ—В —Б–ї–Њ–≤ –≤ —В–µ–Љ–µ") return;
        let userAnswer = answerInput.value.trim().toLowerCase().replace(/\s+/g, ' ');
        let correctAnswer = (currentMode === "ru2fr") 
            ? currentWordObj.fr.toLowerCase().replace(/\s+/g, ' ')
            : currentWordObj.ru.toLowerCase().replace(/\s+/g, ' ');
        
        const isCorrect = (userAnswer === correctAnswer);
        if (isCorrect) {
            submitBtn.innerText = "вЬЕ";
            submitBtn.classList.add("correct");
            submitBtn.classList.remove("wrong");
            statusMsgDiv.innerHTML = "вЬЕ –Т–µ—А–љ–Њ! –°–ї–µ–і—Г—О—Й–µ–µ —Б–ї–Њ–≤–Њ...";
            setTimeout(() => {
                pickRandomWord();
                setSubmitButtonNeutral();
            }, 600);
        } else {
            submitBtn.innerText = "вЭМ";
            submitBtn.classList.add("wrong");
            submitBtn.classList.remove("correct");
            statusMsgDiv.innerHTML = `вЭМ –Э–µ–≤–µ—А–љ–Њ! –Я—А–∞–≤–Є–ї—М–љ–Њ: "${correctAnswer}"`;
        }
        lastAnswerWasOk = true;
    }

    function setSubmitButtonNeutral() {
        submitBtn.innerText = "OK";
        submitBtn.classList.remove("correct", "wrong");
        if (!statusMsgDiv.innerHTML.includes("рЯФК") && !statusMsgDiv.innerHTML.includes("вП©")) {
            statusMsgDiv.innerHTML = "рЯУЭ –Т–≤–µ–і–Є—В–µ –Њ—В–≤–µ—В –Є –љ–∞–ґ–Љ–Є—В–µ OK";
        }
    }

    function onInputChange() {
        if (lastAnswerWasOk || submitBtn.innerText !== "OK") {
            setSubmitButtonNeutral();
            lastAnswerWasOk = false;
        }
    }

    function addCharToInput(ch) {
        if (ch === 'вЖР') {
            answerInput.value = answerInput.value.slice(0, -1);
        } else if (ch === ' ') {
            answerInput.value += ' ';
        } else {
            answerInput.value += ch;
        }
        if (submitBtn.innerText !== "OK") {
            setSubmitButtonNeutral();
            lastAnswerWasOk = false;
        }
        answerInput.focus();
    }

    function renderKeyboard() {
        keyboardDiv.innerHTML = '';
        for (let row of frenchLetters) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'kb-row';
            for (let letter of row) {
                const key = document.createElement('div');
                key.className = 'kb-key';
                key.innerText = letter;
                key.addEventListener('click', () => addCharToInput(letter));
                rowDiv.appendChild(key);
            }
            keyboardDiv.appendChild(rowDiv);
        }
        const extraRow = document.createElement('div');
        extraRow.className = 'kb-row';
        for (let btn of extraButtons) {
            const key = document.createElement('div');
            key.className = 'kb-key kb-special';
            key.innerText = btn;
            key.addEventListener('click', () => addCharToInput(btn));
            extraRow.appendChild(key);
        }
        keyboardDiv.appendChild(extraRow);
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.dataset.mode === mode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if (currentWordObj) showQuestion();
        else pickRandomWord();
        setSubmitButtonNeutral();
        answerInput.value = "";
        answerInput.focus();
    }

    function onSubmitAction() {
        if (submitBtn.innerText === "вЬЕ" || submitBtn.innerText === "вЭМ") return;
        checkAnswer();
    }

    function populateThemeDropdown() {
        const themesSet = new Set();
        themesSet.add("all");
        fullWordsList.forEach(word => themesSet.add(word.theme));
        const sortedThemes = Array.from(themesSet).sort();

    async function loadWords() {
        try {
            const response = await fetch('fslov1.txt');
            if (response.ok) {
                const text = await response.text();
                const lines = text.split(/\r?\n/);
                for (let line of lines) {
                    line = line.trim();
                    if (line === "") continue;
                    const parts = line.split('|');
                    if (parts.length >= 3) {
                        fullWordsList.push({
                            theme: parts[0].trim(),
                            ru: parts[1].trim(),
                            fr: parts[2].trim()
                        });
                    }
                }
            }
        } catch(e) { console.log("–Ч–∞–≥—А—Г–ґ–∞–µ–Љ –≤—Б—В—А–Њ–µ–љ–љ—Л–є —Б–ї–Њ–≤–∞—А—М"); }
        
        if (fullWordsList.length === 0) {
            const builtIn = getBuiltInDictionary();
            for (let entry of builtIn) {
                const parts = entry.split('|');
                if (parts.length === 3) {
                    fullWordsList.push({
                        theme: parts[0],
                        ru: parts[1],
                        fr: parts[2]
                    });
                }
            }
        }
        
        populateThemeDropdown();
        updateFilteredWords();
        renderKeyboard();
    }

    // –Ш–љ–Є—Ж–Є–∞–ї–Є–Ј–∞—Ж–Є—П
    function initUI() {
        document.querySelector('[data-mode="ru2fr"]').addEventListener('click', () => setMode("ru2fr"));
        document.querySelector('[data-mode="fr2ru"]').addEventListener('click', () => setMode("fr2ru"));
        speakerBtn.addEventListener('click', speakCurrentWord);
        submitBtn.addEventListener('click', onSubmitAction);
        skipBtn.addEventListener('click', skipToNextWord);
        answerInput.addEventListener('input', onInputChange);
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') onSubmitAction();
        });
        themeSelect.addEventListener('change', (e) => {
            currentTheme = e.target.value;
            updateFilteredWords();
        });
        setMode("ru2fr");
    }

    loadWords().then(() => initUI());
