<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Французский тренажёр — с произношением</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 20px 16px 24px;
        }
        .card {
            background: #e6f0fa;
            border-radius: 28px;
            padding: 32px 16px;
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            color: #1e2f3e;
            margin-bottom: 24px;
            border: 1px solid #cddfe7;
            word-break: break-word;
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* верхняя панель с переключателем и кнопкой звука */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .mode-switch {
            display: flex;
            gap: 12px;
            flex: 2;
        }
        .mode-btn {
            background: #e9ecef;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #2c3e44;
        }
        .mode-btn.active {
            background: #2c7da0;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .speaker-btn {
            background: #e9ecef;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: #2c3e44;
        }
        .speaker-btn:active {
            background: #2c7da0;
            color: white;
            transform: scale(0.96);
        }
        .input-area {
            margin-bottom: 20px;
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        input {
            flex: 1;
            padding: 16px 14px;
            font-size: 1.3rem;
            border: 2px solid #ccc;
            border-radius: 24px;
            font-family: monospace;
            background: white;
            text-align: center;
            letter-spacing: 0.5px;
        }
        input:focus {
            outline: none;
            border-color: #2c7da0;
        }
        .action-btn {
            width: 70px;
            padding: 14px 0;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            background: #2c7da0;
            color: white;
            cursor: pointer;
        }
        .action-btn.correct {
            background: #2e7d32;
        }
        .action-btn.wrong {
            background: #c62828;
        }
        .keyboard {
            background: #f1f3f4;
            border-radius: 28px;
            padding: 12px 10px;
            margin-top: 6px;
        }
        .kb-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .kb-key {
            background: white;
            border: 1px solid #bbb;
            border-radius: 16px;
            padding: 12px 10px;
            min-width: 50px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            font-family: monospace;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: 0.05s linear;
        }
        .kb-key:active {
            background: #d0d8e0;
            transform: scale(0.96);
        }
        .kb-special {
            background: #e2e6ea;
        }
        @media (max-width: 480px) {
            .kb-key {
                min-width: 42px;
                padding: 10px 6px;
                font-size: 1rem;
            }
            .kb-row {
                gap: 6px;
            }
            .card {
                font-size: 1.5rem;
                padding: 24px 12px;
            }
            input {
                font-size: 1.1rem;
            }
            .speaker-btn {
                width: 44px;
                height: 44px;
                font-size: 1.4rem;
            }
        }
        .status {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 12px;
            color: #5f6c72;
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            color: #8d9aa0;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="card" id="questionCard">---</div>

    <div class="top-bar">
        <div class="mode-switch">
            <button class="mode-btn" data-mode="ru2fr">🇷🇺 → 🇫🇷</button>
            <button class="mode-btn" data-mode="fr2ru">🇫🇷 → 🇷🇺</button>
        </div>
        <button id="speakerBtn" class="speaker-btn" title="Произнести слово">🔊</button>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="answerInput" placeholder="Ваш ответ..." autocomplete="off" autofocus>
            <button id="submitBtn" class="action-btn">OK</button>
        </div>
    </div>

    <div class="keyboard" id="keyboard"></div>
    <div class="status" id="statusMsg">✅ Зелёная галочка = верно</div>
    <div class="footer-note">Формат fslov.txt: русская фраза | французская фраза<br>🔊 Нажмите на динамик — слово прозвучит</div>
</div>

<script>
    // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
    let wordsList = [];
    let currentWordObj = null;
    let currentMode = "ru2fr";
    let remainingIndices = [];
    let lastAnswerWasOk = false;

    const questionCard = document.getElementById("questionCard");
    const answerInput = document.getElementById("answerInput");
    const submitBtn = document.getElementById("submitBtn");
    const speakerBtn = document.getElementById("speakerBtn");
    const keyboardDiv = document.getElementById("keyboard");
    const statusMsgDiv = document.getElementById("statusMsg");

    // ---------- ФРАНЦУЗСКАЯ КЛАВИАТУРА ----------
    const frenchLetters = [
        ['a','b','c','d','e','f','g','h','i','j','k','l','m'],
        ['n','o','p','q','r','s','t','u','v','w','x','y','z'],
        ['à','â','æ','ç','é','è','ê','ë','î','ï','ô','œ','ù','û','ü','ÿ','ñ','-',"'"]
    ];
    const extraButtons = ['←', ' '];

    // ---------- ГОЛОСОВОЕ ПРОИЗНОШЕНИЕ (БЕСПЛАТНЫЙ Web Speech API) ----------
    function speakText(text, lang) {
        if (!text || text === "---") return;
        
        // Останавливаем предыдущую речь, если ещё говорит
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;      // "ru-RU" или "fr-FR"
        utterance.rate = 0.9;       // немного медленнее для лучшего восприятия
        utterance.pitch = 1.0;
        utterance.volume = 1;
        
        // Некоторые браузеры требуют "разрешение" пользователя (автоматически даётся после любого взаимодействия)
        window.speechSynthesis.speak(utterance);
        
        // Небольшой лог в статус (по желанию)
        statusMsgDiv.innerHTML = `🔊 Произносится: "${text.substring(0, 30)}..."`;
        setTimeout(() => {
            if (statusMsgDiv.innerHTML.includes("Произносится")) {
                statusMsgDiv.innerHTML = "✅ Зелёная галочка = верно";
            }
        }, 2000);
    }
    
    function speakCurrentWord() {
        if (!currentWordObj) return;
        let textToSpeak = "";
        let lang = "";
        
        if (currentMode === "ru2fr") {
            textToSpeak = currentWordObj.ru;
            lang = "ru-RU";
        } else {
            textToSpeak = currentWordObj.fr;
            lang = "fr-FR";
        }
        
        if (textToSpeak) {
            speakText(textToSpeak, lang);
        }
    }

    // ---------- ЗАГРУЗКА СЛОВ (ПОДДЕРЖКА ФРАЗ С ПРОБЕЛАМИ) ----------
    async function loadWordsFromFile() {
        try {
            const response = await fetch('fslov.txt');
            if (!response.ok) throw new Error(`файл не найден (${response.status})`);
            const text = await response.text();
            const lines = text.split(/\r?\n/);
            const newWords = [];
            
            for (let line of lines) {
                line = line.trim();
                if (line === "") continue;
                
                let separator = " | ";
                let idx = line.indexOf(separator);
                if (idx === -1) {
                    separator = "|";
                    idx = line.indexOf(separator);
                }
                if (idx === -1) {
                    separator = "\t";
                    idx = line.indexOf(separator);
                }
                if (idx === -1) {
                    console.warn(`Пропущена строка (нет разделителя | или табуляции): ${line}`);
                    continue;
                }
                
                const left = line.slice(0, idx).trim();
                const right = line.slice(idx + separator.length).trim();
                if (left && right) {
                    newWords.push({ ru: left, fr: right });
                }
            }
            
            if (newWords.length === 0) {
                setDemoWords();
            } else {
                wordsList = newWords;
            }
        } catch (err) {
            console.warn("Не удалось загрузить fslov.txt, используем встроенные слова", err);
            setDemoWords();
        }
        resetRemainingIndices();
        pickRandomWord();
        renderKeyboard();
    }

    function setDemoWords() {
        wordsList = [
            { ru: "привет", fr: "bonjour" },
            { ru: "спасибо", fr: "merci" },
            { ru: "пожалуйста", fr: "s'il vous plaît" },
            { ru: "до свидания", fr: "au revoir" },
            { ru: "как дела", fr: "comment ça va" },
            { ru: "хорошо", fr: "bien" },
            { ru: "плохо", fr: "mal" },
            { ru: "машина", fr: "voiture" },
            { ru: "большой дом", fr: "grande maison" },
            { ru: "чёрный кот", fr: "chat noir" }
        ];
    }

    function resetRemainingIndices() {
        if (!wordsList.length) return;
        remainingIndices = [...Array(wordsList.length).keys()];
        for (let i = remainingIndices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [remainingIndices[i], remainingIndices[j]] = [remainingIndices[j], remainingIndices[i]];
        }
    }

    function pickRandomWord() {
        if (!wordsList.length) {
            questionCard.innerText = "Нет слов";
            return;
        }
        if (remainingIndices.length === 0) resetRemainingIndices();
        const nextIndex = remainingIndices.shift();
        currentWordObj = wordsList[nextIndex];
        showQuestion();
    }

    function showQuestion() {
        if (!currentWordObj) return;
        if (currentMode === "ru2fr") {
            questionCard.innerText = currentWordObj.ru;
        } else {
            questionCard.innerText = currentWordObj.fr;
        }
        answerInput.value = "";
        setSubmitButtonNeutral();
        lastAnswerWasOk = false;
        answerInput.focus();
    }

    function checkAnswer() {
        if (!currentWordObj) return;
        let userAnswer = answerInput.value.trim().toLowerCase().replace(/\s+/g, ' ');
        let correctAnswer = (currentMode === "ru2fr") 
            ? currentWordObj.fr.toLowerCase().replace(/\s+/g, ' ')
            : currentWordObj.ru.toLowerCase().replace(/\s+/g, ' ');
        
        const isCorrect = (userAnswer === correctAnswer);
        if (isCorrect) {
            submitBtn.innerText = "✅";
            submitBtn.classList.add("correct");
            submitBtn.classList.remove("wrong");
            statusMsgDiv.innerHTML = "✅ Верно! Следующее слово...";
            setTimeout(() => {
                pickRandomWord();
                setSubmitButtonNeutral();
            }, 600);
        } else {
            submitBtn.innerText = "❌";
            submitBtn.classList.add("wrong");
            submitBtn.classList.remove("correct");
            statusMsgDiv.innerHTML = `❌ Неверно! Правильно: "${correctAnswer}"`;
        }
        lastAnswerWasOk = true;
    }

    function setSubmitButtonNeutral() {
        submitBtn.innerText = "OK";
        submitBtn.classList.remove("correct", "wrong");
        statusMsgDiv.innerHTML = "🔤 Введите ответ, затем OK или нажмите на клавиатуру";
    }

    function onInputChange() {
        if (lastAnswerWasOk || submitBtn.innerText !== "OK") {
            setSubmitButtonNeutral();
            lastAnswerWasOk = false;
        }
    }

    function addCharToInput(ch) {
        if (ch === '←') {
            answerInput.value = answerInput.value.slice(0, -1);
        } else if (ch === ' ') {
            answerInput.value += ' ';
        } else {
            answerInput.value += ch;
        }
        if (submitBtn.innerText !== "OK") {
            setSubmitButtonNeutral();
            lastAnswerWasOk = false;
        }
        answerInput.focus();
    }

    function renderKeyboard() {
        keyboardDiv.innerHTML = '';
        for (let row of frenchLetters) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'kb-row';
            for (let letter of row) {
                const key = document.createElement('div');
                key.className = 'kb-key';
                key.innerText = letter;
                key.addEventListener('click', (e) => addCharToInput(letter));
                rowDiv.appendChild(key);
            }
            keyboardDiv.appendChild(rowDiv);
        }
        const extraRow = document.createElement('div');
        extraRow.className = 'kb-row';
        for (let btn of extraButtons) {
            const key = document.createElement('div');
            key.className = 'kb-key kb-special';
            key.innerText = btn;
            key.addEventListener('click', () => addCharToInput(btn));
            extraRow.appendChild(key);
        }
        keyboardDiv.appendChild(extraRow);
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.dataset.mode === mode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if (currentWordObj) showQuestion();
        else pickRandomWord();
        setSubmitButtonNeutral();
        answerInput.value = "";
        answerInput.focus();
    }

    function onSubmitAction() {
        if (submitBtn.innerText === "✅" || submitBtn.innerText === "❌") return;
        checkAnswer();
    }

    function initUI() {
        document.querySelector('[data-mode="ru2fr"]').addEventListener('click', () => setMode("ru2fr"));
        document.querySelector('[data-mode="fr2ru"]').addEventListener('click', () => setMode("fr2ru"));
        speakerBtn.addEventListener('click', speakCurrentWord);
        submitBtn.addEventListener('click', onSubmitAction);
        answerInput.addEventListener('input', onInputChange);
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                onSubmitAction();
            }
        });
        setMode("ru2fr");
    }

    loadWordsFromFile().then(() => {
        initUI();
    }).catch(() => {
        setDemoWords();
        resetRemainingIndices();
        pickRandomWord();
        initUI();
        renderKeyboard();
    });
</script>
</body>
</html>
