<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaqon — Редактор серий</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --text: #c8c8d4;
            --text-dim: #6c6c7c;
            --accent: #6c5ce7;
            --accent-glow: #a29bfe;
            --red: #ff4444;
            --green: #44cc44;
            --white: #ffffff;
            --radius: 8px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* === HEADER === */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo-v {
            color: var(--accent-glow);
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(162, 155, 254, 0.5);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* === КНОПКИ === */
        button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: var(--font);
            font-size: 14px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        button:hover {
            background: #1a1a2a;
            border-color: var(--accent);
            color: var(--white);
        }

        button.active {
            background: var(--accent);
            border-color: var(--accent-glow);
            color: var(--white);
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.4);
        }

        button.accent {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--white);
            font-weight: 600;
        }

        button.accent:hover {
            background: #7c6ff7;
            box-shadow: 0 0 16px rgba(108, 92, 231, 0.5);
        }

        button.danger {
            border-color: var(--red);
            color: var(--red);
        }

        button.danger:hover {
            background: var(--red);
            color: var(--white);
        }

        button.small {
            padding: 4px 10px;
            font-size: 12px;
        }

        /* === MAIN LAYOUT === */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* === TOOLBAR === */
        .toolbar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            width: 200px;
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .toolbar button {
            text-align: left;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar .tool-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .toolbar .divider {
            border-top: 1px solid var(--border);
            margin: 8px 0;
        }

        .toolbar .tool-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            padding: 8px 4px 4px;
        }

        /* === CANVAS AREA === */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050510;
            position: relative;
            overflow: hidden;
            /* Сетка фона */
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .canvas-wrapper {
            position: relative;
            box-shadow: 0 0 60px rgba(108, 92, 231, 0.15);
            border-radius: 2px;
        }

        canvas#main-canvas {
            display: block;
            max-width: 90vw;
            max-height: 70vh;
            cursor: crosshair;
            border-radius: 2px;
        }

        canvas#main-canvas.crop-mode {
            cursor: crosshair;
        }

        canvas#main-canvas.draw-mode {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' style='font-size:14px'><text y='14'>✏</text></svg>") 0 14, crosshair;
        }

        canvas#main-canvas.marker-mode {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20'><circle cx='10' cy='10' r='8' fill='none' stroke='red' stroke-width='2'/><text x='7' y='14' font-size='10' fill='red'>1</text></svg>") 10 10, crosshair;
        }

        .canvas-placeholder {
            text-align: center;
            color: var(--text-dim);
        }

        .canvas-placeholder .v-big {
            font-size: 80px;
            color: rgba(162, 155, 254, 0.1);
        }

        .canvas-placeholder p {
            margin-top: 16px;
            font-size: 16px;
        }

        /* === RIGHT PANEL === */
        .right-panel {
            background: var(--surface);
            border-left: 1px solid var(--border);
            width: 280px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .panel-section {
            background: #0a0a12;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
        }

        .panel-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .marker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .marker-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--red);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
        }

        .marker-item input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            padding: 4px;
            outline: none;
            border-bottom: 1px solid transparent;
        }

        .marker-item input:focus {
            border-bottom: 1px solid var(--accent);
        }

        textarea {
            width: 100%;
            background: #0a0a12;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            padding: 10px;
            resize: vertical;
            min-height: 60px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        select {
            width: 100%;
            background: #0a0a12;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            padding: 8px;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--accent);
        }

        /* === TIMELINE === */
        .timeline-container {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            flex-shrink: 0;
        }

        .timeline-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .timeline-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .timeline-frames {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            min-height: 90px;
            align-items: center;
        }

        .timeline-frame {
            width: 100px;
            height: 70px;
            border: 2px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.15s;
            background: #000;
        }

        .timeline-frame:hover {
            border-color: var(--text-dim);
        }

        .timeline-frame.active {
            border-color: var(--accent-glow);
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.5);
        }

        .timeline-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .timeline-frame .frame-number {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: var(--white);
            padding: 1px 5px;
            border-radius: 3px;
        }

        .timeline-frame .frame-delete {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: rgba(255, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .timeline-frame:hover .frame-delete {
            display: flex;
        }

        .timeline-add {
            width: 80px;
            height: 70px;
            border: 2px dashed var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            color: var(--text-dim);
            font-size: 28px;
            transition: all 0.15s;
        }

        .timeline-add:hover {
            border-color: var(--accent);
            color: var(--accent-glow);
        }

        /* === TOAST === */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        /* === CROP OVERLAY === */
        .crop-overlay {
            position: absolute;
            border: 2px dashed var(--white);
            background: rgba(108, 92, 231, 0.15);
            pointer-events: none;
            display: none;
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <span class="logo-v">V</span>
            <span>AQON</span>
            <span style="font-size:12px;color:var(--text-dim);font-weight:400;">редактор серий</span>
        </div>
        <div class="header-actions">
            <button onclick="exportSeries()" class="accent">📦 Экспорт серии</button>
            <button onclick="importSeries()">📂 Импорт</button>
            <button onclick="clearAll()" class="danger small">✕ Очистить</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">
        
        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="tool-label">Инструменты</div>
            <button onclick="setTool('select')" id="btn-select" class="active">
                <span class="tool-icon">🖱</span> Указатель
            </button>
            <button onclick="setTool('crop')" id="btn-crop">
                <span class="tool-icon">✂</span> Кадрировать
            </button>
            <button onclick="setTool('draw')" id="btn-draw">
                <span class="tool-icon">✏</span> Рисовать
            </button>
            <button onclick="setTool('text')" id="btn-text">
                <span class="tool-icon">T</span> Текст
            </button>
            <button onclick="setTool('marker')" id="btn-marker">
                <span class="tool-icon">①</span> Метка
            </button>
            <div class="divider"></div>
            <button onclick="undoLast()" class="small">↩ Отменить</button>
            <button onclick="resetCurrentImage()" class="small">↺ Сброс кадра</button>
            <div class="divider"></div>
            <div class="tool-label">Цвет кисти</div>
            <input type="color" id="draw-color" value="#ff4444" 
                   style="width:100%;height:32px;border:none;cursor:pointer;background:transparent;border-radius:4px;">
            <div class="tool-label">Размер кисти</div>
            <input type="range" id="draw-size" min="1" max="20" value="3"
                   style="width:100%;accent-color:var(--accent);">
        </div>

        <!-- CANVAS -->
        <div class="canvas-area" id="canvas-area">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <canvas id="main-canvas"></canvas>
            </div>
            <div class="canvas-placeholder" id="placeholder">
                <div class="v-big">V</div>
                <p>Загрузите изображение, чтобы начать</p>
                <button onclick="loadImage()" class="accent" style="margin-top:12px;">
                    📷 Загрузить картинку
                </button>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel" id="right-panel">
            <div class="panel-section">
                <div class="panel-title">📝 Аннотация (озвучка)</div>
                <textarea id="annotation-text" placeholder="Текст для озвучивания этого кадра..."></textarea>
                <div style="display:flex;gap:6px;margin-top:6px;">
                    <select id="annotation-lang">
                        <option value="ru-RU">🇷🇺 Русский</option>
                        <option value="en-US">🇺🇸 English</option>
                        <option value="zh-CN">🇨🇳 中文</option>
                        <option value="de-DE">🇩🇪 Deutsch</option>
                        <option value="ja-JP">🇯🇵 日本語</option>
                    </select>
                    <button onclick="previewVoice()" class="small" title="Прослушать">▶</button>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title">📍 Метки на кадре</div>
                <div id="marker-list">
                    <span style="color:var(--text-dim);font-size:12px;">Нет меток. Выберите инструмент «Метка» и кликните на изображение.</span>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title">⏱ Настройки серии</div>
                <label style="font-size:12px;color:var(--text-dim);">Автопереключение (сек)</label>
                <input type="number" id="auto-advance" value="3" min="1" max="30"
                       style="width:100%;margin-top:4px;background:#0a0a12;border:1px solid var(--border);color:var(--text);padding:6px;border-radius:4px;">
                <label style="font-size:12px;color:var(--text-dim);margin-top:8px;display:flex;align-items:center;gap:6px;">
                    <input type="checkbox" id="loop-series"> Зациклить
                </label>
            </div>
        </div>
    </div>

    <!-- TIMELINE -->
    <div class="timeline-container">
        <div class="timeline-header">
            <span class="timeline-title">🎞 Кадры серии (<span id="frame-count">0</span>)</span>
            <div style="display:flex;gap:6px;">
                <button onclick="playSeries()" class="small accent">▶ Воспроизвести</button>
                <button onclick="addCurrentToSeries()" class="small">+ Текущий как кадр</button>
            </div>
        </div>
        <div class="timeline-frames" id="timeline-frames">
            <div class="timeline-add" onclick="loadImage()" title="Добавить изображение">+</div>
        </div>
    </div>

    <!-- CROP OVERLAY -->
    <div class="crop-overlay" id="crop-overlay"></div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- HIDDEN FILE INPUT -->
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(event)">

    <script>
        // ==================== V A Q O N   E D I T O R ====================

        // --- DOM REFS ---
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const canvasArea = document.getElementById('canvas-area');
        const placeholder = document.getElementById('placeholder');
        const cropOverlay = document.getElementById('crop-overlay');
        const timelineFrames = document.getElementById('timeline-frames');
        const markerList = document.getElementById('marker-list');
        const annotationText = document.getElementById('annotation-text');
        const annotationLang = document.getElementById('annotation-lang');
        const autoAdvanceInput = document.getElementById('auto-advance');
        const loopCheckbox = document.getElementById('loop-series');
        const frameCountSpan = document.getElementById('frame-count');
        const toastEl = document.getElementById('toast');

        // --- STATE ---
        let currentTool = 'select';
        let seriesFrames = []; // { id, imageData (base64), annotations, markers, originalWidth, originalHeight }
        let currentFrameIndex = -1;
        let currentBaseImage = null; // Image element
        let currentCanvasState = null; // base64 snapshot before edits
        let undoStack = [];
        let markers = [];
        let markerCounter = 1;
        let isDrawing = false;
        let drawColor = '#ff4444';
        let drawSize = 3;
        let cropStart = null;
        let cropRect = null;
        let isCropping = false;

        // --- TOAST ---
        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        // --- TOOL MANAGEMENT ---
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + tool);
            if (btn) btn.classList.add('active');

            canvas.className = '';
            if (tool === 'draw') canvas.classList.add('draw-mode');
            if (tool === 'crop') canvas.classList.add('crop-mode');
            if (tool === 'marker') canvas.classList.add('marker-mode');

            cropOverlay.style.display = 'none';
            isCropping = false;
            cropStart = null;
            cropRect = null;
            isDrawing = false;
        }

        // --- IMAGE LOADING ---
        function loadImage() {
            document.getElementById('file-input').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    loadImageToCanvas(img);
                    saveCurrentToSeries();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function loadImageToCanvas(img) {
            currentBaseImage = img;
            // Fit to reasonable size
            const maxW = canvasArea.clientWidth * 0.8;
            const maxH = canvasArea.clientHeight * 0.7;
            let w = img.width;
            let h = img.height;
            const ratio = Math.min(maxW / w, maxH / h, 1);
            w = Math.floor(w * ratio);
            h = Math.floor(h * ratio);

            canvas.width = w;
            canvas.height = h;
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);
            canvas.style.display = 'block';
            placeholder.style.display = 'none';
            canvasWrapper.style.display = 'block';

            currentCanvasState = canvas.toDataURL('image/png');
            undoStack = [currentCanvasState];
            markers = [];
            markerCounter = 1;
            updateMarkerList();
            annotationText.value = '';
        }

        function resetCurrentImage() {
            if (!currentBaseImage) return;
            loadImageToCanvas(currentBaseImage);
            showToast('↺ Кадр сброшен');
        }

        function undoLast() {
            if (undoStack.length > 1) {
                undoStack.pop();
                const prevState = undoStack[undoStack.length - 1];
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    currentCanvasState = prevState;
                };
                img.src = prevState;
                showToast('↩ Отменено');
            } else {
                showToast('Некуда отменять');
            }
        }

        function saveState() {
            const state = canvas.toDataURL('image/png');
            if (undoStack.length === 0 || undoStack[undoStack.length - 1] !== state) {
                undoStack.push(state);
                if (undoStack.length > 50) undoStack.shift();
            }
            currentCanvasState = state;
        }

        // --- DRAWING ---
        canvas.addEventListener('mousedown', function(e) {
            if (currentTool !== 'draw') return;
            isDrawing = true;
            const pos = getCanvasPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.strokeStyle = drawColor;
            ctx.lineWidth = drawSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            saveState();
        });

        canvas.addEventListener('mousemove', function(e) {
            const pos = getCanvasPos(e);

            if (currentTool === 'draw' && isDrawing) {
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            }

            if (currentTool === 'crop' && isCropping) {
                cropRect = {
                    x: Math.min(cropStart.x, pos.x),
                    y: Math.min(cropStart.y, pos.y),
                    w: Math.abs(pos.x - cropStart.x),
                    h: Math.abs(pos.y - cropStart.y)
                };
                updateCropOverlay();
            }
        });

        canvas.addEventListener('mouseup', function(e) {
            if (currentTool === 'draw' && isDrawing) {
                isDrawing = false;
                ctx.closePath();
                saveState();
            }

            if (currentTool === 'crop' && isCropping && cropRect && cropRect.w > 10 && cropRect.h > 10) {
                applyCrop();
            }

            if (currentTool === 'marker') {
                const pos = getCanvasPos(e);
                addMarker(pos.x, pos.y);
            }
        });

        canvas.addEventListener('mouseleave', function() {
            if (isDrawing) {
                isDrawing = false;
                ctx.closePath();
                saveState();
            }
        });

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        // --- CROP ---
        function updateCropOverlay() {
            if (!cropRect) return;
            const canvasRect = canvas.getBoundingClientRect();
            const areaRect = canvasArea.getBoundingClientRect();
            const scaleX = canvasRect.width / canvas.width;
            const scaleY = canvasRect.height / canvas.height;

            cropOverlay.style.display = 'block';
            cropOverlay.style.left = (canvasRect.left - areaRect.left + cropRect.x * scaleX) + 'px';
            cropOverlay.style.top = (canvasRect.top - areaRect.top + cropRect.y * scaleY) + 'px';
            cropOverlay.style.width = (cropRect.w * scaleX) + 'px';
            cropOverlay.style.height = (cropRect.h * scaleY) + 'px';
        }

        function applyCrop() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = cropRect.w;
            tempCanvas.height = cropRect.h;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, cropRect.x, cropRect.y, cropRect.w, cropRect.h, 0, 0, cropRect.w, cropRect.h);

            canvas.width = cropRect.w;
            canvas.height = cropRect.h;
            ctx.drawImage(tempCanvas, 0, 0);

            cropOverlay.style.display = 'none';
            isCropping = false;
            cropStart = null;
            cropRect = null;
            saveState();
            showToast('✂ Кадрировано');
        }

        canvas.addEventListener('mousedown', function(e) {
            if (currentTool === 'crop' && !isCropping) {
                cropStart = getCanvasPos(e);
                isCropping = true;
            }
        });

        // --- MARKERS ---
        function addMarker(x, y) {
            const id = markerCounter++;
            markers.push({ id, x, y, text: '' });
            drawAllMarkers();
            updateMarkerList();
            saveState();
            showToast('📍 Метка ' + id + ' добавлена');
        }

        function drawAllMarkers() {
            // Redraw from saved state
            const snapshot = currentCanvasState;
            if (!snapshot) return;
            const img = new Image();
            img.onload = function() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                markers.forEach(m => drawMarkerOnCanvas(m));
            };
            img.src = snapshot;
        }

        function drawMarkerOnCanvas(m) {
            ctx.beginPath();
            ctx.arc(m.x, m.y, 14, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255, 68, 68, 0.85)';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(m.id, m.x, m.y);
        }

        function updateMarkerList() {
            if (markers.length === 0) {
                markerList.innerHTML =
                    '<span style="color:var(--text-dim);font-size:12px;">Нет меток. Выберите инструмент «Метка» и кликните на изображение.</span>';
            } else {
                markerList.innerHTML = markers.map(m => `
                <div class="marker-item">
                  <span class="marker-circle">${m.id}</span>
                  <input type="text" value="${m.text}" placeholder="Описание..."
                         onchange="updateMarkerText(${m.id}, this.value)">
                  <button class="small danger" onclick="deleteMarker(${m.id})" style="padding:2px 6px;">✕</button>
                </div>
              `).join('');
            }
        }

        function updateMarkerText(id, text) {
            const marker = markers.find(m => m.id === id);
            if (marker) {
                marker.text = text;
                if (currentFrameIndex >= 0 && seriesFrames[currentFrameIndex]) {
                    seriesFrames[currentFrameIndex].markers = JSON.parse(JSON.stringify(markers));
                }
            }
        }

        function deleteMarker(id) {
            markers = markers.filter(m => m.id !== id);
            drawAllMarkers();
            updateMarkerList();
            saveState();
            if (currentFrameIndex >= 0 && seriesFrames[currentFrameIndex]) {
                seriesFrames[currentFrameIndex].markers = JSON.parse(JSON.stringify(markers));
            }
            showToast('Метка удалена');
        }

        // --- TEXT TOOL ---
        canvas.addEventListener('click', function(e) {
            if (currentTool !== 'text') return;
            const pos = getCanvasPos(e);
            const text = prompt('Введите текст:');
            if (!text) return;
            saveState();
            ctx.font = 'bold 24px "Segoe UI", sans-serif';
            ctx.fillStyle = drawColor;
            ctx.textAlign = 'center';
            ctx.fillText(text, pos.x, pos.y);
            saveState();
            showToast('Текст добавлен');
        });

        // --- SERIES MANAGEMENT ---
        function saveCurrentToSeries() {
            if (!currentCanvasState) return;
            const frameData = {
                id: 'frame_' + Date.now(),
                imageData: currentCanvasState,
                markers: JSON.parse(JSON.stringify(markers)),
                annotation: {
                    text: annotationText.value,
                    lang: annotationLang.value
                },
                width: canvas.width,
                height: canvas.height
            };
            seriesFrames.push(frameData);
            currentFrameIndex = seriesFrames.length - 1;
            renderTimeline();
            showToast('✅ Кадр ' + seriesFrames.length + ' сохранён');
        }

        function addCurrentToSeries() {
            if (!currentCanvasState) {
                showToast('Сначала загрузите изображение');
                return;
            }
            // Update current frame data before saving new
            if (currentFrameIndex >= 0 && seriesFrames[currentFrameIndex]) {
                seriesFrames[currentFrameIndex].imageData = currentCanvasState;
                seriesFrames[currentFrameIndex].markers = JSON.parse(JSON.stringify(markers));
                seriesFrames[currentFrameIndex].annotation = {
                    text: annotationText.value,
                    lang: annotationLang.value
                };
            }
            saveCurrentToSeries();
        }

        function selectFrame(index) {
            // Save current frame
            if (currentFrameIndex >= 0 && seriesFrames[currentFrameIndex]) {
                seriesFrames[currentFrameIndex].imageData = currentCanvasState;
                seriesFrames[currentFrameIndex].markers = JSON.parse(JSON.stringify(markers));
                seriesFrames[currentFrameIndex].annotation = {
                    text: annotationText.value,
                    lang: annotationLang.value
                };
            }

            currentFrameIndex = index;
            const frame = seriesFrames[index];
            const img = new Image();
            img.onload = function() {
                loadImageToCanvas(img);
                markers = JSON.parse(JSON.stringify(frame.markers || []));
                markerCounter = markers.length > 0 ? Math.max(...markers.map(m => m.id)) + 1 : 1;
                annotationText.value = frame.annotation?.text || '';
                annotationLang.value = frame.annotation?.lang || 'ru-RU';
                updateMarkerList();
                drawAllMarkers();
            };
            img.src = frame.imageData;
            renderTimeline();
        }

        function deleteFrame(index, event) {
            event.stopPropagation();
            seriesFrames.splice(index, 1);
            if (currentFrameIndex >= seriesFrames.length) {
                currentFrameIndex = seriesFrames.length - 1;
            }
            if (currentFrameIndex < 0) {
                currentFrameIndex = -1;
                canvas.style.display = 'none';
                placeholder.style.display = 'block';
                canvasWrapper.style.display = 'none';
                markers = [];
                updateMarkerList();
            } else {
                selectFrame(currentFrameIndex);
            }
            renderTimeline();
            showToast('Кадр удалён');
        }

        function renderTimeline() {
            const existing = timelineFrames.querySelectorAll('.timeline-frame');
            existing.forEach(el => el.remove());

            seriesFrames.forEach((frame, i) => {
                const div = document.createElement('div');
                div.className = 'timeline-frame' + (i === currentFrameIndex ? ' active' : '');
                div.draggable = true;
                div.innerHTML = `
                <img src="${frame.imageData}" alt="Frame ${i+1}">
                <span class="frame-number">${i + 1}</span>
                <span class="frame-delete" onclick="deleteFrame(${i}, event)">✕</span>
              `;
                div.addEventListener('click', () => selectFrame(i));

                // Drag and drop
                div.addEventListener('dragstart', function(e) {
                    e.dataTransfer.setData('text/plain', i);
                    this.style.opacity = '0.5';
                });
                div.addEventListener('dragend', function() {
                    this.style.opacity = '1';
                });
                div.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.style.borderColor = 'var(--accent-glow)';
                });
                div.addEventListener('dragleave', function() {
                    this.style.borderColor = 'var(--border)';
                });
                div.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.style.borderColor = 'var(--border)';
                    const from = parseInt(e.dataTransfer.getData('text/plain'));
                    if (from !== i) {
                        const [moved] = seriesFrames.splice(from, 1);
                        seriesFrames.splice(i, 0, moved);
                        if (currentFrameIndex === from) currentFrameIndex = i;
                        else if (currentFrameIndex === i) currentFrameIndex = from;
                        renderTimeline();
                    }
                });

                timelineFrames.insertBefore(div, timelineFrames.lastElementChild);
            });

            frameCountSpan.textContent = seriesFrames.length;
        }

        // --- VOICE PREVIEW ---
        function previewVoice() {
            const text = annotationText.value.trim();
            if (!text) {
                showToast('Введите текст аннотации');
                return;
            }
            const synth = window.speechSynthesis;
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = annotationLang.value;
            utterance.rate = 0.9;
            const voices = synth.getVoices();
            const voice = voices.find(v => v.lang.startsWith(annotationLang.value.split('-')[0]));
            if (voice) utterance.voice = voice;
            synth.speak(utterance);
            showToast('🔊 Озвучка...');
        }

        // --- PLAY SERIES ---
        function playSeries() {
            if (seriesFrames.length === 0) {
                showToast('Нет кадров для воспроизведения');
                return;
            }
            // Save current
            if (currentFrameIndex >= 0 && seriesFrames[currentFrameIndex]) {
                seriesFrames[currentFrameIndex].imageData = currentCanvasState;
                seriesFrames[currentFrameIndex].markers = JSON.parse(JSON.stringify(markers));
                seriesFrames[currentFrameIndex].annotation = {
                    text: annotationText.value,
                    lang: annotationLang.value
                };
            }

            const delay = parseInt(autoAdvanceInput.value) * 1000 || 3000;
            const loop = loopCheckbox.checked;
            let idx = 0;

            const synth = window.speechSynthesis;

            function showNext() {
                if (idx >= seriesFrames.length) {
                    if (loop) { idx = 0; } else {
                        showToast('⏹ Конец серии');
                        return;
                    }
                }
                const frame = seriesFrames[idx];
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    if (frame.markers) {
                        frame.markers.forEach(m => drawMarkerOnCanvas(m));
                    }
                    canvas.style.display = 'block';
                    placeholder.style.display = 'none';
                    canvasWrapper.style.display = 'block';

                    // Voice
                    if (frame.annotation?.text) {
                        synth.cancel();
                        const utterance = new SpeechSynthesisUtterance(frame.annotation.text);
                        utterance.lang = frame.annotation.lang || 'ru-RU';
                        utterance.rate = 0.9;
                        const voices = synth.getVoices();
                        const voice = voices.find(v => v.lang.startsWith((frame.annotation.lang || 'ru')
                            .split('-')[0]));
                        if (voice) utterance.voice = voice;
                        synth.speak(utterance);
                    }

                    // Highlight timeline
                    document.querySelectorAll('.timeline-frame').forEach((el, i) => {
                        el.classList.toggle('active', i === idx);
                    });
                };
                img.src = frame.imageData;
                idx++;
                if (idx < seriesFrames.length || loop) {
                    setTimeout(showNext, delay);
                }
            }

            showNext();
            showToast('▶ Воспроизведение серии (' + seriesFrames.length + ' кадров)');
        }

        // --- EXPORT / IMPORT ---
        function exportSeries() {
            if (currentFrameIndex >= 0 && seriesFrames[currentFrameIndex]) {
                seriesFrames[currentFrameIndex].imageData = currentCanvasState;
                seriesFrames[currentFrameIndex].markers = JSON.parse(JSON.stringify(markers));
                seriesFrames[currentFrameIndex].annotation = {
                    text: annotationText.value,
                    lang: annotationLang.value
                };
            }

            const seriesData = {
                type: 'series',
                version: '1.0',
                app: 'Vaqon Editor',
                exported: new Date().toISOString(),
                title: 'Серия Vaqon',
                frames: seriesFrames,
                player_settings: {
                    auto_advance: parseInt(autoAdvanceInput.value) || 3,
                    loop: loopCheckbox.checked
                }
            };

            const blob = new Blob([JSON.stringify(seriesData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'vaqon-series-' + Date.now() + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('📦 Серия экспортирована');
        }

        function importSeries() {
            document.getElementById('import-input').click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.type === 'series' && data.frames) {
                        seriesFrames = data.frames;
                        autoAdvanceInput.value = data.player_settings?.auto_advance || 3;
                        loopCheckbox.checked = data.player_settings?.loop || false;
                        currentFrameIndex = seriesFrames.length > 0 ? 0 : -1;
                        renderTimeline();
                        if (currentFrameIndex >= 0) selectFrame(0);
                        showToast('📂 Импортировано ' + seriesFrames.length + ' кадров');
                    } else {
                        showToast('Ошибка: неверный формат');
                    }
                } catch (err) {
                    showToast('Ошибка чтения файла');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function clearAll() {
            if (!confirm('Очистить все кадры и текущее изображение?')) return;
            seriesFrames = [];
            currentFrameIndex = -1;
            markers = [];
            markerCounter = 1;
            undoStack = [];
            currentBaseImage = null;
            currentCanvasState = null;
            canvas.style.display = 'none';
            placeholder.style.display = 'block';
            canvasWrapper.style.display = 'none';
            canvas.width = 0;
            canvas.height = 0;
            updateMarkerList();
            annotationText.value = '';
            renderTimeline();
            showToast('Очищено');
        }

        // --- COLOR / SIZE ---
        document.getElementById('draw-color').addEventListener('input', function() {
            drawColor = this.value;
        });
        document.getElementById('draw-size').addEventListener('input', function() {
            drawSize = parseInt(this.value);
        });

        // --- ANNOTATION AUTO-SAVE ---
        annotationText.addEventListener('input', function() {
            if (currentFrameIndex >= 0 && seriesFrames[currentFrameIndex]) {
                seriesFrames[currentFrameIndex].annotation = {
                    text: annotationText.value,
                    lang: annotationLang.value
                };
            }
        });
        annotationLang.addEventListener('change', function() {
            if (currentFrameIndex >= 0 && seriesFrames[currentFrameIndex]) {
                seriesFrames[currentFrameIndex].annotation = {
                    text: annotationText.value,
                    lang: annotationLang.value
                };
            }
        });

        // --- INIT ---
        console.log('%c V A Q O N %c редактор серий ',
            'color:#a29bfe;font-size:24px;font-weight:900;',
            'color:#c8c8d4;font-size:14px;');
        console.log('Откройте изображение, чтобы начать работу.');
        console.log('Инструменты: ✂ Кадрирование | ✏ Рисование | T Текст | ① Метки | 🔊 Озвучка');
    </script>
</body>
</html>
