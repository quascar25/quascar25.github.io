<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ключевая ставка ЦБ РФ_4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }
        .frame {
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 40px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 200px;
            min-height: 120px;
            background-color: transparent;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.03);
        }
        .rate {
            color: #ffffff;
            font-size: clamp(48px, 15vw, 120px);
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.2;
            user-select: none;
        }
        .percent {
            font-size: 0.6em;
            font-weight: 300;
            margin-left: 2px;
        }
        .loading {
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            font-weight: 300;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        .update-info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.5px;
            pointer-events: none;
        }
        .error-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.4em;
        }
        @media (max-width: 400px) {
            .frame {
                padding: 25px 35px;
                min-width: 150px;
                min-height: 90px;
                border-width: 1px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="frame">
            <div class="rate" id="rateDisplay">
                <span class="loading">···</span>
            </div>
        </div>
    </div>
    <div class="update-info" id="updateInfo">загрузка...</div>

    <script>
        (function() {
            'use strict';

            const rateDisplay = document.getElementById('rateDisplay');
            const updateInfo = document.getElementById('updateInfo');
            let isFetching = false;

            // ----- НОВЫЙ ИСТОЧНИК: СТРАНИЦА ИСТОРИИ СТАВОК НА САЙТЕ ЦБ РФ -----
            // Страница: http://www.cbr.ru/hd_base/KeyRate/
            // Содержит таблицу со всеми ставками, включая актуальную.
            // Запрашиваем через прокси для обхода CORS.

            async function fetchKeyRate() {
                if (isFetching) return;
                isFetching = true;

                try {
                    // Используем прокси для обхода CORS
                    const response = await fetch('https://silent-cherry-6c61.quascar20.workers.dev/', {  method: 'GET'  }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const html = await response.text();

                    // Парсим HTML: ищем строку "Ключевая ставка" и число с %
                    // Пример: "Ключевая ставка, установленная Банком России с 22 июня 2026 г. ... 14,25 %"
                    let rate = null;
                    let date = null;

                    // Ищем процентную ставку
                    const rateMatch = html.match(/Ключевая ставка[^0-9]*([0-9,]+)\s*%/i);
                    if (rateMatch && rateMatch[1]) {
                        rate = parseFloat(rateMatch[1].replace(',', '.'));
                    }

                    // Ищем дату введения ставки
                    const dateMatch = html.match(/с\s+(\d{2}\s+\w+\s+\d{4})\s+г\.?/i);
                    if (dateMatch && dateMatch[1]) {
                        date = dateMatch[1];
                    }

                    if (rate !== null && !isNaN(rate) && rate > 0) {
                        displayRate(rate, date);
                    } else {
                        // Если парсинг не удался, пробуем запасной источник
                        await fetchSecondarySource();
                    }

                } catch (error) {
                    console.warn('Основной источник не сработал:', error);
                    await fetchSecondarySource();
                } finally {
                    isFetching = false;
                }
            }

            // ----- ЗАПАСНОЙ ИСТОЧНИК: ТА ЖЕ СТРАНИЦА, НО ЧЕРЕЗ ДРУГОЙ ПРОКСИ -----
            async function fetchSecondarySource() {
                try {
                    // Используем другой прокси-сервис
                    const response = await fetch(
                        'https://corsproxy.io/?' +
                        encodeURIComponent('https://www.cbr.ru/hd_base/KeyRate/'),
                        {
                            method: 'GET'
                        }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const html = await response.text();

                    // Тот же парсинг
                    let rate = null;
                    let date = null;

                    const rateMatch = html.match(/Ключевая ставка[^0-9]*([0-9,]+)\s*%/i);
                    if (rateMatch && rateMatch[1]) {
                        rate = parseFloat(rateMatch[1].replace(',', '.'));
                    }

                    const dateMatch = html.match(/с\s+(\d{2}\s+\w+\s+\d{4})\s+г\.?/i);
                    if (dateMatch && dateMatch[1]) {
                        date = dateMatch[1];
                    }

                    if (rate !== null && !isNaN(rate) && rate > 0) {
                        displayRate(rate, date);
                    } else {
                        // Если ничего не нашли
                        throw new Error('Данные не найдены');
                    }

                } catch (error) {
                    console.error('Все источники недоступны:', error);
                    rateDisplay.innerHTML = '<span class="error-text">нет данных</span>';
                    updateInfo.textContent = 'обновите страницу';
                }
            }

            // ----- ОТОБРАЖЕНИЕ ДАННЫХ -----
            function displayRate(rate, date) {
                if (rate !== null && !isNaN(rate) && rate > 0) {
                    const formatted = parseFloat(rate.toFixed(2));
                    rateDisplay.innerHTML = `${formatted}<span class="percent">%</span>`;
                } else {
                    rateDisplay.innerHTML = '<span class="error-text">ошибка</span>';
                }

                if (date) {
                    updateInfo.textContent = `актуально с ${date}`;
                } else {
                    const now = new Date();
                    updateInfo.textContent = `актуально на ${now.toLocaleDateString('ru-RU')}`;
                }
            }

            function showLoading() {
                rateDisplay.innerHTML = '<span class="loading">···</span>';
                updateInfo.textContent = 'загрузка...';
            }

            function refreshRate() {
                if (!navigator.onLine) {
                    rateDisplay.innerHTML = '<span class="error-text">нет соединения</span>';
                    updateInfo.textContent = 'проверьте интернет';
                    return;
                }
                showLoading();
                fetchKeyRate();
            }

            // ----- ИНИЦИАЛИЗАЦИЯ -----
            function init() {
                refreshRate();

                // Автообновление каждые 30 минут
                setInterval(refreshRate, 30 * 60 * 1000);

                // Обновление при возврате на вкладку
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) refreshRate();
                });

                // Обновление при восстановлении интернета
                window.addEventListener('online', refreshRate);

                // Клик для ручного обновления
                document.addEventListener('click', refreshRate);

                console.log('📊 Ключевая ставка РФ — приложение загружено');
                console.log('🔄 Кликните по экрану для обновления');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
