<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ключевая ставка ЦБ РФ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .frame {
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 40px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 200px;
            min-height: 120px;
            background-color: transparent;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.03);
        }

        .rate {
            color: #ffffff;
            font-size: clamp(48px, 15vw, 120px);
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.2;
            user-select: none;
            -webkit-user-select: none;
        }

        .percent {
            font-size: 0.6em;
            font-weight: 300;
            margin-left: 2px;
        }

        .loading {
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            font-weight: 300;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .update-info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.5px;
            pointer-events: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        .error-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.4em;
        }

        @media (max-width: 400px) {
            .frame {
                padding: 25px 35px;
                min-width: 150px;
                min-height: 90px;
                border-width: 1px;
            }
        }

        .frame {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="frame">
            <div class="rate" id="rateDisplay">
                <span class="loading">···</span>
            </div>
        </div>
    </div>

    <div class="update-info" id="updateInfo">загрузка...</div>

    <script>
        (function() {
            'use strict';

            const rateDisplay = document.getElementById('rateDisplay');
            const updateInfo = document.getElementById('updateInfo');
            let isFetching = false;
            let refreshTimer = null;

            // ----- ВАШ WORKER НА CLOUDFLARE -----
            // ЗАМЕНИТЕ ЭТОТ URL НА АДРЕС ВАШЕГО WORKER'А!
            const WORKER_URL = 'https://silent-cherry-6c61.quascar20.workers.dev/';

            // ----- ПОЛУЧЕНИЕ ДАННЫХ С ВАШЕГО WORKER'А -----
            async function fetchKeyRate() {
                if (isFetching) return;
                isFetching = true;

                const isFirstLoad = rateDisplay.innerHTML.includes('···');
                if (!isFirstLoad) {
                    rateDisplay.style.opacity = '0.5';
                }

                try {
                    // Запрос к вашему Cloudflare Worker
                    const response = await fetch(WORKER_URL, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();

                    // Проверяем, есть ли ставка в ответе
                    if (data && data.rate !== undefined && data.rate !== null) {
                        const rate = parseFloat(data.rate);
                        if (!isNaN(rate) && rate > 0) {
                            displayRate(rate);
                            return;
                        }
                    }

                    // Если ставка не найдена
                    throw new Error('Ставка не найдена в ответе');

                } catch (error) {
                    console.error('Ошибка получения данных:', error);
                    rateDisplay.innerHTML = '<span class="error-text">нет данных</span>';
                    updateInfo.textContent = 'проверьте соединение';
                } finally {
                    isFetching = false;
                    rateDisplay.style.opacity = '1';
                }
            }

            // ----- ОТОБРАЖЕНИЕ ДАННЫХ -----
            function displayRate(rate) {
                if (rate !== null && !isNaN(rate) && rate > 0) {
                    const formatted = parseFloat(rate.toFixed(2));
                    rateDisplay.innerHTML = `${formatted}<span class="percent">%</span>`;
                    const now = new Date();
                    updateInfo.textContent = `актуально на ${now.toLocaleDateString('ru-RU')}`;
                } else {
                    rateDisplay.innerHTML = '<span class="error-text">ошибка</span>';
                    updateInfo.textContent = 'некорректные данные';
                }
            }

            // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -----
            function showLoading() {
                rateDisplay.innerHTML = '<span class="loading">···</span>';
                updateInfo.textContent = 'загрузка...';
            }

            function refreshRate() {
                if (!navigator.onLine) {
                    rateDisplay.innerHTML = '<span class="error-text">нет соединения</span>';
                    updateInfo.textContent = 'проверьте интернет';
                    return;
                }
                showLoading();
                fetchKeyRate();
            }

            // ----- ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ -----
            function init() {
                // Первая загрузка
                refreshRate();

                // Автообновление каждые 30 минут
                refreshTimer = setInterval(refreshRate, 30 * 60 * 1000);

                // Обновление при возврате на вкладку
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        refreshRate();
                    }
                });

                // Обновление при восстановлении интернета
                window.addEventListener('online', () => {
                    refreshRate();
                });

                // Ручное обновление по клику
                document.addEventListener('click', (e) => {
                    if (e.target.closest('a, button')) return;
                    refreshRate();
                });

                // Блокировка скролла
                document.addEventListener('gesturestart', (e) => e.preventDefault());
                document.addEventListener('touchmove', (e) => {
                    if (e.target === document.body) e.preventDefault();
                }, { passive: false });

                console.log('📊 Ключевая ставка РФ — приложение загружено');
                console.log('🔄 Кликните по экрану для обновления');
                console.log(`🔗 Worker URL: ${WORKER_URL}`);
            }

            // Запуск
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
