<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ключевая ставка ЦБ РФ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        body {
            background-image: url('seyf.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 30px;
            gap: 30px;
        }

        .frame-top {
            background-color: rgba(0, 0, 0, 0.75);
            border-radius: 12px;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 160px;
            min-height: 80px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: opacity 0.5s ease, transform 0.3s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .frame-top.updating {
            opacity: 0.5;
            transform: scale(0.97);
        }

        .rate {
            color: #ffffff;
            font-size: clamp(36px, 10vw, 80px);
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.2;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.5s ease;
        }

        .percent {
            font-size: 0.6em;
            font-weight: 300;
            margin-left: 2px;
        }

        .loading {
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px;
            font-weight: 300;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .frame-bottom {
            background-color: rgba(0, 0, 0, 0.75);
            border-radius: 12px;
            padding: 18px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 200px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .info-line {
            text-align: center;
            color: rgba(220, 220, 220, 0.85);
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 0.5px;
            pointer-events: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            line-height: 2.0;
        }

        .info-line .date {
            color: rgba(220, 220, 220, 0.65);
            font-size: 0.9em;
        }

        .info-line .next-meeting {
            color: rgba(220, 220, 220, 0.5);
            font-size: 0.75em;
            margin-top: 2px;
        }

        .info-line .forecast {
            color: rgba(220, 220, 220, 0.4);
            font-size: 0.85em;
            margin-top: 2px;
        }

        .forecast.down {
            color: rgba(100, 255, 100, 0.6) !important;
        }
        .forecast.up {
            color: rgba(255, 100, 100, 0.6) !important;
        }
        .forecast.steady {
            color: rgba(220, 220, 220, 0.4) !important;
        }

        .error-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.4em;
        }

        /* Индикатор загрузки */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .frame-top {
                padding: 14px 28px;
                min-width: 120px;
                min-height: 60px;
                border-radius: 10px;
            }
            .rate {
                font-size: clamp(30px, 8vw, 60px);
            }
            .frame-bottom {
                padding: 14px 20px;
                min-width: 160px;
                border-radius: 10px;
            }
            .info-line {
                font-size: 17px;
                line-height: 1.8;
            }
            .container {
                gap: 20px;
                padding: 20px;
            }
        }

        @media (max-width: 360px) {
            .frame-top {
                padding: 10px 20px;
                min-width: 100px;
                min-height: 50px;
            }
            .rate {
                font-size: clamp(24px, 7vw, 44px);
            }
            .frame-bottom {
                padding: 10px 16px;
                min-width: 140px;
            }
            .info-line {
                font-size: 14px;
                line-height: 1.6;
            }
            .container {
                gap: 15px;
                padding: 15px;
            }
        }

        .frame-top, .frame-bottom {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="container">
        <div class="frame-top" id="frameTop">
            <div class="rate" id="rateDisplay">
                <span class="loading">···</span>
            </div>
        </div>

        <div class="frame-bottom" id="frameBottom">
            <div class="info-line">
                <div class="date" id="dateDisplay">загрузка...</div>
                <div class="next-meeting" id="nextMeetingDisplay"></div>
                <div class="forecast" id="forecastDisplay"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const rateDisplay = document.getElementById('rateDisplay');
            const dateDisplay = document.getElementById('dateDisplay');
            const nextMeetingDisplay = document.getElementById('nextMeetingDisplay');
            const forecastDisplay = document.getElementById('forecastDisplay');
            const frameTop = document.getElementById('frameTop');
            let isFetching = false;
            let refreshTimer = null;
            let retryCount = 0;
            const MAX_RETRIES = 3;

            // ----- АДРЕС ВАШЕГО WORKER (ЗАМЕНИТЕ!) -----
            const WORKER_URL = 'https://silent-cherry-6c61.quascar20.workers.dev/';

            // ----- ДАТА СЛЕДУЮЩЕГО ЗАСЕДАНИЯ -----
            const NEXT_MEETING = new Date(2026, 6, 24);

            // ----- ФУНКЦИЯ ПРОГНОЗА -----
            function generateForecast(currentRate) {
                const forecastRate = 14.0;
                const diff = currentRate - forecastRate;

                let direction = 'steady';
                let emoji = '→';
                let changeText = 'без изменений';

                if (diff > 0.1) {
                    direction = 'down';
                    emoji = '↓';
                    changeText = `снижение до ${forecastRate.toFixed(2)}%`;
                } else if (diff < -0.1) {
                    direction = 'up';
                    emoji = '↑';
                    changeText = `повышение до ${forecastRate.toFixed(2)}%`;
                }

                return {
                    direction: direction,
                    emoji: emoji,
                    text: `прогноз: ${changeText} ${emoji}`,
                    forecastRate: forecastRate
                };
            }

            // ----- ФОРМАТИРОВАНИЕ ДАТЫ -----
            function formatDate(dateObj) {
                if (!dateObj || isNaN(dateObj.getTime())) return null;
                const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня',
                                'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
                const day = dateObj.getDate();
                const month = months[dateObj.getMonth()];
                const year = dateObj.getFullYear();
                return `${day} ${month} ${year}`;
            }

            // ----- ПОЛУЧЕНИЕ ДАННЫХ С ВАШЕГО WORKER (С ПОВТОРНЫМИ ПОПЫТКАМИ) -----
            async function fetchKeyRate() {
                if (isFetching) return;
                isFetching = true;
                retryCount = 0;

                frameTop.classList.add('updating');

                // Показываем индикатор загрузки, если данных ещё нет
                if (rateDisplay.innerHTML.includes('···') || rateDisplay.innerHTML.includes('loading')) {
                    // Уже показываем загрузку
                } else {
                    // Показываем спиннер на время обновления
                    rateDisplay.innerHTML = '<span class="loading">⟳</span>';
                }

                try {
                    const result = await fetchWithTimeout(WORKER_URL, {
                        method: 'GET',
                        headers: { 
                            'Accept': 'application/json',
                            'Cache-Control': 'no-cache, no-store, must-revalidate',
                            'Pragma': 'no-cache',
                            'Expires': '0'
                        },
                        timeout: 8000 // 8 секунд таймаут
                    });

                    if (!result) {
                        throw new Error('Таймаут или ошибка сети');
                    }

                    const data = result;

                    if (data && data.rate !== undefined && data.rate !== null) {
                        const rate = parseFloat(data.rate);
                        if (!isNaN(rate) && rate > 0) {
                            displayRate(rate, data.date);
                            retryCount = 0;
                            return;
                        }
                    }

                    throw new Error('Ставка не найдена');

                } catch (error) {
                    console.error('Ошибка получения данных:', error);
                    
                    // Пробуем повторно
                    if (retryCount < MAX_RETRIES) {
                        retryCount++;
                        console.log(`Повторная попытка ${retryCount}/${MAX_RETRIES}...`);
                        await new Promise(resolve => setTimeout(resolve, 1000 * retryCount));
                        isFetching = false;
                        await fetchKeyRate();
                        return;
                    }

                    // Если все попытки провалились
                    showError('нет соединения');
                } finally {
                    isFetching = false;
                    setTimeout(() => {
                        frameTop.classList.remove('updating');
                    }, 300);
                }
            }

            // ----- ФУНКЦИЯ ЗАПРОСА С ТАЙМАУТОМ -----
            function fetchWithTimeout(url, options, timeout = 8000) {
                return Promise.race([
                    fetch(url, options).then(r => r.json()),
                    new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('Таймаут запроса')), timeout)
                    )
                ]);
            }

            // ----- ПОКАЗ ОШИБКИ -----
            function showError(message) {
                rateDisplay.innerHTML = `<span class="error-text">${message}</span>`;
                dateDisplay.textContent = 'проверьте интернет';
                nextMeetingDisplay.textContent = '';
                forecastDisplay.textContent = '';
                forecastDisplay.className = 'forecast';
            }

            // ----- ОТОБРАЖЕНИЕ ДАННЫХ -----
            function displayRate(rate, date) {
                const formatted = parseFloat(rate.toFixed(2));
                rateDisplay.innerHTML = `${formatted}<span class="percent">%</span>`;

                if (date) {
                    const dateObj = new Date(date);
                    if (!isNaN(dateObj.getTime())) {
                        dateDisplay.textContent = `с ${formatDate(dateObj)}`;
                    } else {
                        dateDisplay.textContent = `с ${date}`;
                    }
                } else {
                    const now = new Date();
                    dateDisplay.textContent = `актуально на ${now.toLocaleDateString('ru-RU')}`;
                }

                const nextDateFormatted = formatDate(NEXT_MEETING);
                if (nextDateFormatted) {
                    nextMeetingDisplay.textContent = `следующее заседание ЦБ: ${nextDateFormatted}`;
                }

                const forecast = generateForecast(rate);
                forecastDisplay.textContent = forecast.text;
                forecastDisplay.className = 'forecast ' + forecast.direction;
            }

            // ----- ПОКАЗ ЗАГРУЗКИ -----
            function showLoading() {
                rateDisplay.innerHTML = '<span class="loading">···</span>';
                dateDisplay.textContent = 'загрузка...';
                nextMeetingDisplay.textContent = '';
                forecastDisplay.textContent = '';
                forecastDisplay.className = 'forecast';
            }

            // ----- ОБНОВЛЕНИЕ -----
            function refreshRate() {
                if (!navigator.onLine) {
                    showError('нет интернета');
                    return;
                }
                showLoading();
                fetchKeyRate();
            }

            // ----- ИНИЦИАЛИЗАЦИЯ -----
            function init() {
                // Принудительно очищаем кеш при загрузке
                if ('caches' in window) {
                    caches.keys().then(keys => {
                        keys.forEach(key => {
                            caches.delete(key);
                        });
                    });
                }

                refreshRate();

                // Обновление каждые 30 минут
                refreshTimer = setInterval(refreshRate, 30 * 60 * 1000);

                // Обновление при возврате на вкладку
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        // Небольшая задержка, чтобы не нагружать
                        setTimeout(refreshRate, 300);
                    }
                });

                // Обновление при восстановлении интернета
                window.addEventListener('online', () => {
                    setTimeout(refreshRate, 500);
                });

                // Клик для ручного обновления (с защитой от частых нажатий)
                let lastClickTime = 0;
                document.addEventListener('click', (e) => {
                    if (e.target.closest('a, button')) return;
                    const now = Date.now();
                    if (now - lastClickTime > 3000) { // Не чаще 1 раза в 3 секунды
                        lastClickTime = now;
                        refreshRate();
                    }
                });

                document.addEventListener('gesturestart', (e) => e.preventDefault());
                document.addEventListener('touchmove', (e) => {
                    if (e.target === document.body) e.preventDefault();
                }, { passive: false });

                console.log('📊 Ключевая ставка РФ — приложение загружено');
                console.log(`🔗 Worker URL: ${WORKER_URL}`);
                console.log('🔄 Кликните по экрану для обновления');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
