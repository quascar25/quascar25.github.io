<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ключевая ставка ЦБ РФ</title>
    <style>
        /* Сброс и базовые стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Полноэкранный черный фон */
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Контейнер для рамки и числа */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        /* Тонкая прямоугольная рамка */
        .frame {
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 40px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 200px;
            min-height: 120px;
            background-color: transparent;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.03);
        }

        /* Число внутри рамки */
        .rate {
            color: #ffffff;
            font-size: clamp(48px, 15vw, 120px);
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.2;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Процентный знак чуть меньше */
        .percent {
            font-size: 0.6em;
            font-weight: 300;
            margin-left: 2px;
        }

        /* Индикатор загрузки */
        .loading {
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            font-weight: 300;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Мелкая дата обновления внизу */
        .update-info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.5px;
            pointer-events: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        /* Адаптация под очень маленькие экраны */
        @media (max-width: 400px) {
            .frame {
                padding: 25px 35px;
                min-width: 150px;
                min-height: 90px;
                border-width: 1px;
            }
        }

        /* Подавление выделения при тапе */
        .frame {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="frame">
            <div class="rate" id="rateDisplay">
                <span class="loading">···</span>
            </div>
        </div>
    </div>

    <div class="update-info" id="updateInfo">обновление...</div>

    <script>
        (function() {
            'use strict';

            // Элементы DOM
            const rateDisplay = document.getElementById('rateDisplay');
            const updateInfo = document.getElementById('updateInfo');

            // Флаг для предотвращения множественных запросов
            let isFetching = false;
            // Таймер для автообновления
            let refreshTimer = null;

            /**
             * Форматирование даты в читаемый вид
             */
            function formatDate(dateStr) {
                if (!dateStr) return 'неизвестно';
                try {
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('ru-RU', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric'
                    });
                } catch {
                    return dateStr;
                }
            }

            /**
             * Отображение ставки на экране
             */
            function displayRate(rate, date) {
                if (rate !== null && rate !== undefined && !isNaN(rate)) {
                    // Форматируем число: убираем лишние нули
                    const formatted = parseFloat(rate.toFixed(2));
                    rateDisplay.innerHTML = `${formatted}<span class="percent">%</span>`;
                } else {
                    rateDisplay.innerHTML = '<span style="color: rgba(255,255,255,0.4); font-size: 0.5em;">ошибка</span>';
                }

                if (date) {
                    updateInfo.textContent = `актуально на ${formatDate(date)}`;
                } else {
                    updateInfo.textContent = 'актуально на сегодня';
                }
            }

            /**
             * Показ состояния загрузки
             */
            function showLoading() {
                rateDisplay.innerHTML = '<span class="loading">···</span>';
                updateInfo.textContent = 'загрузка...';
            }

            /**
             * Получение ключевой ставки с API
             */
            async function fetchKeyRate() {
                // Защита от одновременных запросов
                if (isFetching) return;
                isFetching = true;

                // Показываем загрузку только если это не первая загрузка
                const isFirstLoad = rateDisplay.innerHTML.includes('···');
                if (!isFirstLoad) {
                    // Если уже есть данные, показываем легкую анимацию обновления
                    rateDisplay.style.opacity = '0.5';
                }

                try {
                    // Используем API от legalcalc.ru (бесплатный и стабильный)
                    const response = await fetch(
                        'https://api.legalcalc.ru/api/public/keyrate/current',
                        {
                            method: 'GET',
                            headers: {
                                'Accept': 'application/json'
                            }
                        }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();

                    // Парсим ответ
                    // Ожидаем структуру: { success: true, rate: 14.25, date: "2026-07-09" }
                    let rate = null;
                    let date = null;

                    if (data && data.success === true) {
                        if (typeof data.rate === 'number') {
                            rate = data.rate;
                        } else if (typeof data.rate === 'string') {
                            rate = parseFloat(data.rate.replace(',', '.'));
                        }
                        date = data.date || data.period || null;
                    } else if (data && typeof data.rate === 'number') {
                        // fallback если структура другая
                        rate = data.rate;
                        date = data.date || null;
                    } else if (data && data.value !== undefined) {
                        // ещё один fallback
                        rate = parseFloat(data.value);
                        date = data.date || null;
                    }

                    if (rate !== null && !isNaN(rate)) {
                        displayRate(rate, date);
                    } else {
                        // Если не удалось распарсить, пробуем альтернативный API
                        await fetchAlternativeAPI();
                    }

                } catch (error) {
                    console.warn('Основной API недоступен, пробуем резервный...', error);
                    // Пробуем резервный источник
                    await fetchAlternativeAPI();
                } finally {
                    isFetching = false;
                    rateDisplay.style.opacity = '1';
                }
            }

            /**
             * Резервный API (cbr.ru через прокси)
             * Используем бесплатный прокси для получения данных с сайта ЦБ
             */
            async function fetchAlternativeAPI() {
                try {
                    // Используем API от cbr.ru (требуется прокси из-за CORS)
                    // Вместо прямого запроса к cbr.ru используем общедоступный прокси
                    const response = await fetch(
                        'https://api.allorigins.win/raw?url=' +
                        encodeURIComponent('https://cbr.ru/hd_base/KeyRate/'),
                        {
                            method: 'GET',
                            headers: {
                                'Accept': 'text/html'
                            }
                        }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const html = await response.text();

                    // Парсим HTML: ищем значение ставки в таблице
                    // Это ненадежно, но как резервный вариант сгодится
                    const match = html.match(/Ключевая ставка[^>]*>([\d,]+)%/i);
                    if (match && match[1]) {
                        const rate = parseFloat(match[1].replace(',', '.'));
                        if (!isNaN(rate)) {
                            displayRate(rate, null);
                            return;
                        }
                    }

                    // Если парсинг не удался, показываем ошибку
                    throw new Error('Не удалось распарсить ставку');

                } catch (error) {
                    console.error('Все источники данных недоступны:', error);
                    rateDisplay.innerHTML = '<span style="color: rgba(255,255,255,0.3); font-size: 0.4em;">нет данных</span>';
                    updateInfo.textContent = 'обновите страницу';
                }
            }

            /**
             * Обработка ошибок сети и других проблем
             */
            function handleNetworkError() {
                rateDisplay.innerHTML = '<span style="color: rgba(255,255,255,0.3); font-size: 0.4em;">нет соединения</span>';
                updateInfo.textContent = 'проверьте интернет';
            }

            /**
             * Основная функция обновления
             */
            function refreshRate() {
                // Проверяем наличие интернета
                if (!navigator.onLine) {
                    handleNetworkError();
                    return;
                }

                showLoading();
                fetchKeyRate().catch(() => {
                    handleNetworkError();
                });
            }

            /**
             * Инициализация приложения
             */
            function init() {
                // Первая загрузка
                refreshRate();

                // Автообновление каждые 30 минут (ставка меняется редко)
                refreshTimer = setInterval(refreshRate, 30 * 60 * 1000);

                // Обновление при возврате на вкладку
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        refreshRate();
                    }
                });

                // Обновление при восстановлении соединения
                window.addEventListener('online', () => {
                    refreshRate();
                });

                // Обновление при тапе/клике (ручное обновление)
                document.addEventListener('click', (e) => {
                    // Не обновляем если клик по ссылке или кнопке
                    if (e.target.closest('a, button')) return;
                    refreshRate();
                });

                // Предотвращаем скролл и зуминг
                document.addEventListener('gesturestart', (e) => e.preventDefault());
                document.addEventListener('touchmove', (e) => {
                    if (e.target === document.body) e.preventDefault();
                }, { passive: false });

                console.log('📊 Ключевая ставка РФ — приложение загружено');
                console.log('🔄 Кликните по экрану для обновления');
            }

            // Запускаем, когда DOM полностью загружен
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
