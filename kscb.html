<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ключевая ставка ЦБ РФ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .frame {
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 40px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 200px;
            min-height: 120px;
            background-color: transparent;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.03);
        }

        .rate {
            color: #ffffff;
            font-size: clamp(48px, 15vw, 120px);
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            line-height: 1.2;
            user-select: none;
            -webkit-user-select: none;
        }

        .percent {
            font-size: 0.6em;
            font-weight: 300;
            margin-left: 2px;
        }

        .loading {
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            font-weight: 300;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .update-info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.5px;
            pointer-events: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }

        .error-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.4em;
        }

        @media (max-width: 400px) {
            .frame {
                padding: 25px 35px;
                min-width: 150px;
                min-height: 90px;
                border-width: 1px;
            }
        }

        .frame {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="frame">
            <div class="rate" id="rateDisplay">
                <span class="loading">···</span>
            </div>
        </div>
    </div>

    <div class="update-info" id="updateInfo">загрузка...</div>

    <script>
        (function() {
            'use strict';

            const rateDisplay = document.getElementById('rateDisplay');
            const updateInfo = document.getElementById('updateInfo');
            let isFetching = false;
            let refreshTimer = null;

            // ----- НОВЫЙ ИСТОЧНИК ДАННЫХ (без токенов!) -----
            // Используем API от cbr.ru через бесплатный прокси
            // Все данные берутся напрямую с официального сайта ЦБ РФ
            
            async function fetchKeyRate() {
                if (isFetching) return;
                isFetching = true;

                const isFirstLoad = rateDisplay.innerHTML.includes('···');
                if (!isFirstLoad) {
                    rateDisplay.style.opacity = '0.5';
                }

                try {
                    // ПРЯМОЙ ЗАПРОС к API ЦБ РФ (без токенов)
                    // Это публичный эндпоинт, который возвращает JSON
                    const response = await fetch(
                        'https://www.cbr.ru/hd_base/KeyRate/',
                        {
                            method: 'GET',
                            headers: {
                                'Accept': 'application/json, text/html',
                                'User-Agent': 'Mozilla/5.0'
                            }
                        }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const text = await response.text();
                    
                    // Парсим HTML - ищем ключевую ставку
                    // Ищем паттерн: "Ключевая ставка" и число с % рядом
                    let rate = null;
                    let date = null;

                    // Вариант 1: Ищем в тексте "Ключевая ставка" и число
                    const rateMatch = text.match(/Ключевая ставка[^0-9]*([0-9,]+)\s*%/i);
                    if (rateMatch && rateMatch[1]) {
                        rate = parseFloat(rateMatch[1].replace(',', '.'));
                    }

                    // Вариант 2: Ищем в таблице с данными
                    if (!rate) {
                        const tableMatch = text.match(/<td[^>]*>([0-9,]+)\s*%<\/td>/i);
                        if (tableMatch && tableMatch[1]) {
                            rate = parseFloat(tableMatch[1].replace(',', '.'));
                        }
                    }

                    // Вариант 3: Ищем JSON-данные в скриптах
                    if (!rate) {
                        const jsonMatch = text.match(/"KeyRate"\s*:\s*([0-9.]+)/i);
                        if (jsonMatch && jsonMatch[1]) {
                            rate = parseFloat(jsonMatch[1]);
                        }
                    }

                    // Пытаемся найти дату
                    const dateMatch = text.match(/(\d{2}\.\d{2}\.\d{4})/);
                    if (dateMatch && dateMatch[1]) {
                        date = dateMatch[1];
                    }

                    // Если нашли ставку - показываем
                    if (rate !== null && !isNaN(rate) && rate > 0) {
                        displayRate(rate, date);
                    } else {
                        // Если не нашли - пробуем второй источник
                        await fetchSecondarySource();
                    }

                } catch (error) {
                    console.warn('Первый источник не сработал:', error);
                    await fetchSecondarySource();
                } finally {
                    isFetching = false;
                    rateDisplay.style.opacity = '1';
                }
            }

            // ----- ВТОРОЙ ИСТОЧНИК (альтернативный прокси) -----
            async function fetchSecondarySource() {
                try {
                    // Используем другой бесплатный прокси-сервис
                    const response = await fetch(
                        'https://api.allorigins.win/raw?url=' +
                        encodeURIComponent('https://www.cbr.ru/hd_base/KeyRate/'),
                        {
                            method: 'GET'
                        }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const html = await response.text();
                    
                    // Парсим HTML
                    let rate = null;
                    let date = null;

                    // Ищем ключевую ставку
                    const rateMatch = html.match(/Ключевая ставка[^0-9]*([0-9,]+)\s*%/i);
                    if (rateMatch && rateMatch[1]) {
                        rate = parseFloat(rateMatch[1].replace(',', '.'));
                    }

                    // Ищем дату
                    const dateMatch = html.match(/(\d{2}\.\d{2}\.\d{4})/);
                    if (dateMatch && dateMatch[1]) {
                        date = dateMatch[1];
                    }

                    if (rate !== null && !isNaN(rate) && rate > 0) {
                        displayRate(rate, date);
                    } else {
                        // Пробуем третий источник
                        await fetchThirdSource();
                    }

                } catch (error) {
                    console.warn('Второй источник не сработал:', error);
                    await fetchThirdSource();
                }
            }

            // ----- ТРЕТИЙ ИСТОЧНИК (ещё один API) -----
            async function fetchThirdSource() {
                try {
                    // Используем API от другого сервиса
                    const response = await fetch(
                        'https://www.cbr-xml-daily.ru/latest.js',
                        {
                            method: 'GET'
                        }
                    );

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const text = await response.text();
                    // Парсим JS-файл с курсами
                    const match = text.match(/timestamp\s*:\s*(\d+)/i);
                    if (match && match[1]) {
                        const timestamp = parseInt(match[1]);
                        const date = new Date(timestamp * 1000);
                        
                        // В этом API нет прямой ставки, но можно получить через курс RUB
                        // Показываем дату последнего обновления
                        updateInfo.textContent = `данные на ${date.toLocaleDateString('ru-RU')}`;
                        rateDisplay.innerHTML = `<span style="color: rgba(255,255,255,0.3); font-size: 0.4em;">нет данных</span>`;
                        return;
                    }

                    // Если ничего не нашли
                    throw new Error('Данные не найдены');

                } catch (error) {
                    console.error('Все источники недоступны:', error);
                    rateDisplay.innerHTML = '<span class="error-text">нет данных</span>';
                    updateInfo.textContent = 'обновите страницу';
                }
            }

            // ----- ОТОБРАЖЕНИЕ ДАННЫХ -----
            function displayRate(rate, date) {
                if (rate !== null && rate !== undefined && !isNaN(rate) && rate > 0) {
                    const formatted = parseFloat(rate.toFixed(2));
                    rateDisplay.innerHTML = `${formatted}<span class="percent">%</span>`;
                } else {
                    rateDisplay.innerHTML = '<span class="error-text">ошибка</span>';
                }

                if (date) {
                    updateInfo.textContent = `актуально на ${date}`;
                } else {
                    const now = new Date();
                    updateInfo.textContent = `актуально на ${now.toLocaleDateString('ru-RU')}`;
                }
            }

            function showLoading() {
                rateDisplay.innerHTML = '<span class="loading">···</span>';
                updateInfo.textContent = 'загрузка...';
            }

            function handleNetworkError() {
                rateDisplay.innerHTML = '<span class="error-text">нет соединения</span>';
                updateInfo.textContent = 'проверьте интернет';
            }

            function refreshRate() {
                if (!navigator.onLine) {
                    handleNetworkError();
                    return;
                }
                showLoading();
                fetchKeyRate().catch(() => {
                    handleNetworkError();
                });
            }

            // ----- ИНИЦИАЛИЗАЦИЯ -----
            function init() {
                refreshRate();

                // Автообновление каждые 30 минут
                refreshTimer = setInterval(refreshRate, 30 * 60 * 1000);

                // Обновление при возврате на вкладку
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        refreshRate();
                    }
                });

                // Обновление при восстановлении соединения
                window.addEventListener('online', () => {
                    refreshRate();
                });

                // Клик для ручного обновления
                document.addEventListener('click', (e) => {
                    if (e.target.closest('a, button')) return;
                    refreshRate();
                });

                // Блокировка скролла
                document.addEventListener('gesturestart', (e) => e.preventDefault());
                document.addEventListener('touchmove', (e) => {
                    if (e.target === document.body) e.preventDefault();
                }, { passive: false });

                console.log('📊 Ключевая ставка РФ — приложение загружено');
                console.log('🔄 Кликните по экрану для обновления');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
